<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dev-erp</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Row 0: 최상단 유틸/바로가기 바 (ECount 최상단 단축영역식) — 검색·바로가기 전용 행, 1분류와 분리 -->
      <div class="util-bar">
        <div class="search-wrap">
          <input id="globalSearch" type="search" placeholder="메뉴·화면 검색" />
        </div>
        <button id="paletteBtn" class="fav-chip" title="빠른 이동 (Cmd/Ctrl+K)">⌘K</button>
        <div id="favBar" class="fav-bar"></div>
        <button id="pinCurrentBtn" class="fav-chip pin-cur" title="이 화면 바로가기 등록">☆ 바로가기 등록</button>
        <span id="freshness" class="freshness"></span>
        <span id="appVersionChips" class="version-strip" aria-label="ERP 버전"></span>
      </div>
      <!-- Row 1: 로고(콕핏) + 1분류(대분류 탭) + 오른쪽 유틸 아이콘 -->
      <div class="brand-bar">
        <strong id="appTitle">…</strong>
        <nav id="groupBar" class="group-bar"></nav>
        <div class="global-actions">
          <button id="chatBtn" class="fav-chip icon-btn" title="AI 어시스턴트 — 물어보기"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.7 4.6L18 9l-4.3 1.4L12 15l-1.7-4.6L6 9l4.3-1.4L12 3z"/><path d="M18.5 14l.8 2 .2.2 2 .8-2 .8-.2.2-.8 2-.8-2-.2-.2-2-.8 2-.8.2-.2.8-2z"/></svg></button>
          <button id="notifBtn" class="fav-chip icon-btn" title="알림"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 1 1 4 0c3 1 4 3 4 6 0 4 2 5 2 5H4s2-1 2-5c0-3 1-5 4-6"/><path d="M10 20a2 2 0 0 0 4 0"/></svg><span id="notifBadge" class="notif-badge hidden"></span></button>
          <button id="timelineBtn" class="fav-chip icon-btn" title="타임라인"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg></button>
          <button id="noteBtn" class="fav-chip icon-btn" title="내 메모"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L18.5 9.5a2 2 0 0 0-3-3L5 17z"/><path d="M13.5 6.5l3 3"/></svg></button>
          <button id="mailComposeBtn" class="fav-chip icon-btn" title="Outlook로 메일 쓰기"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7l8.5 6 8.5-6"/></svg></button>
          <button id="themeBtn" class="fav-chip icon-btn" title="다크/라이트 전환"></button>
          <label class="mode-toggle">
            <span id="modeLabel">표시 모드</span>
            <select id="modeSelect">
              <option value="business">업무</option>
              <option value="fantasy">판타지</option>
            </select>
          </label>
          <span id="authBox" class="auth-box"></span>
        </div>
      </div>
      <nav id="subBar" class="sub-bar"></nav>
      <aside class="side">
        <nav id="nav"></nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <h1 id="viewTitle">…</h1>
        </header>
        <section id="view" class="view"></section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
