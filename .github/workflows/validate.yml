name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root-done-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install root dependencies
        run: npm ci

      - name: Install ui-workspace dependencies
        run: npm ci --prefix ui-workspace

      - name: Run root done check
        run: npm run done:check
