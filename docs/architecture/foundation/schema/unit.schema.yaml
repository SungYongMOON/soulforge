schema_id: soulforge.foundation.unit.v1
kind: canonical_schema
applies_to:
  owner: .unit
  path: .unit/<unit_id>/unit.yaml
required_fields:
  - name: unit_id
    type: string
    description: Active subject identifier.
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: summary
    type: string
  - name: identity
    type: object
    description: Active subject identity block carrying profile_ref, species_id, hero_id.
  - name: class_ids
    type: list[string]
    description: Canonical class ids assigned to the unit.
optional_fields:
  - name: notes
    type: list[string]
    description: Human-readable owner notes.
field_rules:
  - field: identity.profile_ref
    rule: String id, not a path.
  - field: identity.species_id
    rule: Canonical species id resolving to .registry/species/<species_id>/species.yaml.
  - field: identity.hero_id
    rule: Resolves only within the selected identity.species_id.
  - field: class_ids
    rule: Canonical class ids resolving to .registry/classes/<class_id>/class.yaml.
  - field: identity.species_id + class_ids
    rule: Species and classes are orthogonal selections. Compatibility, if needed, belongs to unit, party, workflow, or mission rules rather than .registry catalogs.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - Unit is the active subject root. It does not own workflow, party, or project-local runtime truth.
  - unit.yaml keeps the active subject shape compact and avoids generic catalog metadata fields.
  - Runtime truth remains under runs/<run_id>/ in local workspaces.
