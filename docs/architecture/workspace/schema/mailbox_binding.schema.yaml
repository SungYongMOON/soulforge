schema_id: soulforge.workspace.mailbox_binding.v1
kind: canonical_schema
applies_to:
  owner: .project_agent
  path: docs/architecture/workspace/examples/<project_code>/.project_agent/bindings/mailbox_binding.yaml
required_fields:
  - name: mailbox_id
    type: string
    description: Mailbox binding identifier.
  - name: kind
    type: string
    fixed: mailbox_binding
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: profile_ref
    type: string
    description: String id for mailbox handling profile.
  - name: routing_mode
    type: string
    description: Human-readable routing mode.
optional_fields:
  - name: notes
    type: list[string]
field_rules:
  - field: profile_ref
    rule: String id, not a path.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - Mailbox binding is routing metadata only.
