schema_id: soulforge.workspace.workflow_binding.v1
kind: canonical_schema
applies_to:
  owner: _workmeta
  path: _workmeta/<project_code>/bindings/workflow_binding.yaml
required_fields:
  - name: workflow_id
    type: string
    description: Workflow canon identifier.
  - name: kind
    type: string
    fixed: workflow_binding
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: profile_ref
    type: string
    description: String id for the workflow binding profile.
  - name: entrypoint
    type: string
    description: Named starting action.
optional_fields:
  - name: notes
    type: list[string]
    description: Human-readable notes.
field_rules:
  - field: workflow_id
    rule: Resolves to .workflow/<workflow_id>/workflow.yaml.
  - field: profile_ref
    rule: String id, not a path.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - This binding is orchestration metadata under _workmeta/<project_code>/bindings/.
  - This binding does not own raw truth. Runtime records belong under runs/<run_id>/.

