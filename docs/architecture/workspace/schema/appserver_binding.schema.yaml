schema_id: soulforge.workspace.appserver_binding.v1
kind: canonical_schema
applies_to:
  owner: .project_agent
  path: .project_agent/bindings/appserver_binding.yaml
required_fields:
  - name: appserver_id
    type: string
    description: Application server binding identifier.
  - name: kind
    type: string
    fixed: appserver_binding
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: profile_ref
    type: string
    description: String id for the appserver binding profile.
  - name: surface
    type: string
    description: Named serving surface.
optional_fields:
  - name: notes
    type: list[string]
field_rules:
  - field: profile_ref
    rule: String id, not a path.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - Appserver binding describes operating surface only under .project_agent/bindings/.
  - It does not store secrets, runtime dumps, or run-scoped truth.
