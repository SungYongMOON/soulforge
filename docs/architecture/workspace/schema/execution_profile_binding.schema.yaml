schema_id: soulforge.workspace.execution_profile_binding.v1
kind: canonical_schema
applies_to:
  owner: .project_agent
  path: .project_agent/bindings/execution_profile_binding.yaml
required_fields:
  - name: kind
    type: string
    fixed: execution_profile_binding
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: profiles
    type: list[object]
    description: Runtime execution profile entries.
optional_fields:
  - name: notes
    type: list[string]
field_rules:
  - field: profiles[*].execution_profile_ref
    rule: String id matched by workflow step execution_profile_ref.
  - field: profiles[*].model
    rule: Local runtime model id.
  - field: profiles[*].reasoning_effort
    rule: Local runtime reasoning preset such as low, medium, high, xhigh.
  - field: profiles[*].attached_skill_names
    rule: Optional list of installed Codex skill names. Public tracked examples should use names only, not local paths.
  - field: profiles[*].preferred_mcps
    rule: Optional list of local MCP or capability names.
  - field: profiles[*].preferred_tools
    rule: Optional list of concrete tool or command hints.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - Execution profiles are local runtime binding metadata under .project_agent/bindings/.
  - They influence model, reasoning, attached skill package, and MCP/tool preference without becoming raw truth.
