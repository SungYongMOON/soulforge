schema_id: soulforge.workspace.party_binding.v1
kind: canonical_schema
applies_to:
  owner: .project_agent
  path: .project_agent/bindings/party_binding.yaml
required_fields:
  - name: party_id
    type: string
    description: Party canon identifier.
  - name: kind
    type: string
    fixed: party_binding
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: profile_ref
    type: string
    description: String id for the party binding profile.
  - name: formation_role
    type: string
    description: Human-readable formation role.
optional_fields:
  - name: notes
    type: list[string]
field_rules:
  - field: party_id
    rule: Resolves to .party/<party_id>/party.yaml.
  - field: profile_ref
    rule: String id, not a path.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - Party binding is orchestration metadata under .project_agent/bindings/, not runtime truth.
