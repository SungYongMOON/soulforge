schema_id: soulforge.workspace.skill_execution_binding.v1
kind: canonical_schema
applies_to:
  owner: _workmeta
  path: _workmeta/<project_code>/bindings/skill_execution_binding.yaml
required_fields:
  - name: kind
    type: string
    fixed: skill_execution_binding
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: skill_bindings
    type: list[object]
    description: Local skill execution binding entries.
optional_fields:
  - name: notes
    type: list[string]
field_rules:
  - field: skill_bindings[*].skill_id
    rule: Canonical skill id resolving to .registry/skills/<skill_id>/skill.yaml.
  - field: skill_bindings[*].codex_skill_name
    rule: Installed Codex skill name used by the local runtime.
  - field: skill_bindings[*].notes
    rule: Optional human-readable notes for local runtime operators.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - This binding maps canonical skill ids to installed Codex skill names.
  - Public tracked examples should keep only installed skill names, not host-local skill paths.

