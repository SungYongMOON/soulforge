schema_id: soulforge.workspace.workmeta_contract.v1
kind: canonical_schema
applies_to:
  owner: _workmeta
  path: _workmeta/<project_code>/contract.yaml
required_fields:
  - name: project_code
    type: string
    description: Workspace project identifier.
  - name: kind
    type: string
    fixed: workmeta_contract
  - name: status
    type: enum
    allowed:
      - draft
      - active
      - archived
  - name: display_name
    type: string
  - name: unit_ref
    type: string
    description: Pointer to .unit/<unit_id>/unit.yaml.
  - name: bindings
    type: object
    required_children:
      - workflow
      - party
      - appserver
      - mailbox
  - name: runtime_truth_root
    type: string
    description: Directory name for raw truth.
optional_fields:
  - name: notes
    type: list[string]
    description: Human-readable notes.
  - name: bindings.execution_profiles
    type: string
    description: Relative path file pointer to execution_profile_binding.yaml.
  - name: bindings.skill_execution
    type: string
    description: Relative path file pointer to skill_execution_binding.yaml.
field_rules:
  - field: unit_ref
    rule: Pointer to .unit/<unit_id>/unit.yaml. The referenced unit uses unit_id, status, summary, identity, class_ids.
  - field: bindings.workflow
    rule: Relative path file pointer from contract.yaml to workflow_binding.yaml.
  - field: bindings.party
    rule: Relative path file pointer from contract.yaml to party_binding.yaml.
  - field: bindings.appserver
    rule: Relative path file pointer from contract.yaml to appserver_binding.yaml.
  - field: bindings.mailbox
    rule: Relative path file pointer from contract.yaml to mailbox_binding.yaml.
  - field: bindings.execution_profiles
    rule: Optional relative path file pointer from contract.yaml to execution_profile_binding.yaml.
  - field: bindings.skill_execution
    rule: Optional relative path file pointer from contract.yaml to skill_execution_binding.yaml.
  - field: runtime_truth_root
    rule: Use runs/. Raw truth always materializes under runs/<run_id>/.
  - field: status
    rule: Use only draft, active, archived.
notes:
  - The same contract shape applies to local _workmeta/<project_code>/contract.yaml and to tracked examples under docs/architecture/workspace/examples/.
  - Tracked example contracts live under docs/architecture/workspace/examples/, not under _workspaces/.
  - Actual runtime data remains local-only under runs/<run_id>/.
  - Optional runtime execution bindings can refine how workflow steps choose models, attached skills, and MCP/tool preferences.

