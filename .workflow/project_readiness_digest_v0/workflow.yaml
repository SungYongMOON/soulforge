  - review_gate_packet_refs
  - verification_plan_refs
  - source_gap_packet_refs
  - closure_loop_refs
  - owner_backlog_refs
  - calibration_priority_refs
outputs:
  - project_readiness_digest
  - status_rollup
  - priority_blockers
  - owner_input_queue
  - next_action_recommendations
