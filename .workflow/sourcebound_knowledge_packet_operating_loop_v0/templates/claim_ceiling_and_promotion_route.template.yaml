workflow_id: sourcebound_knowledge_packet_operating_loop_v0
kind: claim_ceiling_and_promotion_route
status: draft
route_id: "<route_id>"
allowed_states:
  - observed
  - source_supported
  - validated_private
  - canon_candidate
  - canon_entry
  - rejected_or_blocked
  - source_supported_candidate
  - review_required
  - blocked_pending_source
  - blocked_pending_owner_decision
  - advisory_only
delegated_canon_policy:
  applicable: false
  policy_refs: []
  owner_decision_refs: []
  per_item_owner_confirmation_required: true
  policy_grants_target_layer_registration: false
  authority_guard:
    result: "pass|fail|blocked|unknown|not_applicable"
    accepted_authority: "none|owner_decision|owner_delegated_policy"
    refs: []
  post_development_review_gate_refs: []
  does_not_delegate:
    source_truth: true
    ontology_acceptance: true
    external_upload: true
    final_domain_doctrine: true
    default_route_mutation: true
source_support_guard:
  result: "pass|fail|blocked|unknown|not_applicable"
  allowed_claim_ceiling: "observed|source_supported|validated_private|canon_candidate|canon_entry|rejected_or_blocked"
  refs: []
public_canon_guards:
  owner_surface:
    result: "pass|fail|blocked|unknown|not_applicable"
    refs: []
  public_safe_abstraction:
    result: "pass|fail|blocked|unknown|not_applicable"
    refs: []
  private_raw_secret_exclusion:
    result: "pass|fail|blocked|unknown|not_applicable"
    refs: []
  schema_or_readme_contract:
    result: "pass|fail|blocked|unknown|not_applicable"
    refs: []
  changelog_sync_when_applicable:
    result: "pass|fail|blocked|unknown|not_applicable"
    refs: []
  validation_or_review_route:
    result: "pass|fail|blocked|unknown|not_applicable"
    refs: []
routes:
  - candidate_id: "<candidate_id>"
    claim_ceiling: review_required
    route_target: "hold_private|owner_decision|canon_candidate|canon_entry"
    route_authority: "none|owner_decision_plus_review_gate|delegated_policy_plus_review_gate"
    delegated_policy_refs: []
    owner_decision_refs: []
    post_development_review_gate_refs: []
    target_refs:
      owner_surface: null
      canon_package_refs: []
      canon_entry_refs: []
      schema_refs: []
      readme_refs: []
      changelog_refs: []
      validation_refs: []
    failed_public_canon_guards: []
    canon_registration_required_this_task: false
    canon_registration_completed: false
    claim_ceiling_after_registration: "not_applicable|observed|source_supported|validated_private|canon_candidate|canon_entry|rejected_or_blocked"
    rationale: null
    required_next_action: null
route_rules:
  canon_candidate_requires_all:
    - source_support_guard_pass
    - six_public_canon_guards_pass
  canon_candidate_requires_one_of:
    - delegated_policy_plus_review_gate
    - owner_decision_plus_review_gate
  canon_entry_requires_all:
    - source_support_guard_pass
    - six_public_canon_guards_pass
  canon_entry_requires_one_of:
    - delegated_policy_plus_review_gate
    - owner_decision_plus_review_gate
  otherwise_route_target:
    - hold_private
    - owner_decision
  unknown_or_failed_guard_blocks_same_task_registration: true
