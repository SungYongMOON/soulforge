workflow_id: sourcebound_knowledge_packet_operating_loop_v0
kind: sourcebound_knowledge_packet_manifest
status: draft
packet_id: "<packet_id>"
source_truth_boundary:
  source_truth_owner: source_packets_or_owner_held_sources
  packet_is_derivative_projection: true
  packet_is_not_source_authority: true
source_refs:
  - source_ref_id: "<source_ref_id>"
    source_state: official_present_or_owner_approved_local
    allowed_for_projection: true
projection_outputs:
  index_path: "compiled_projection/index.md"
  log_path: "compiled_projection/log.md"
  query_pages: []
owner_held_archive:
  archive_surface: "google_drive|other_owner_held_archive|not_applicable"
  archive_manifest_ref: "knowledge_package_archive_manifest.yaml"
  archive_is_storage_and_backup_not_authority: true
  agent_upload_authority: "none|owner_approved_connector_action|codex_skill_auto_sync"
  per_file_owner_confirmation_required: false
delegated_canon_policy:
  applicable: false
  policy_refs: []
  owner_decision_refs: []
  per_item_owner_confirmation_required: true
  policy_grants_target_layer_registration: false
  authority_guard:
    result: "pass|fail|blocked|unknown|not_applicable"
    accepted_authority: "none|owner_decision|owner_delegated_policy"
    refs: []
  post_development_review_gate_refs: []
  does_not_delegate:
    source_truth: true
    ontology_acceptance: true
    external_upload: true
    final_domain_doctrine: true
    default_route_mutation: true
source_support_guard:
  result: "pass|fail|blocked|unknown|not_applicable"
  allowed_claim_ceiling: "observed|source_supported|validated_private|canon_candidate|canon_entry|rejected_or_blocked"
  refs: []
public_canon_guards:
  owner_surface: "pass|fail|blocked|unknown|not_applicable"
  public_safe_abstraction: "pass|fail|blocked|unknown|not_applicable"
  private_raw_secret_exclusion: "pass|fail|blocked|unknown|not_applicable"
  schema_or_readme_contract: "pass|fail|blocked|unknown|not_applicable"
  changelog_sync_when_applicable: "pass|fail|blocked|unknown|not_applicable"
  validation_or_review_route: "pass|fail|blocked|unknown|not_applicable"
canon_registration:
  canon_registration_required_this_task: false
  canon_registration_completed: false
  target_refs:
    owner_surface: null
    canon_package_refs: []
    canon_entry_refs: []
    schema_refs: []
    readme_refs: []
    changelog_refs: []
    validation_refs: []
  failed_public_canon_guards: []
  claim_ceiling_after_registration: "not_applicable|observed|source_supported|validated_private|canon_candidate|canon_entry|rejected_or_blocked"
operation_log_events:
  - source_ref_intake
  - projection_compile
  - lint
  - concept_candidate_extraction
  - claim_ceiling_route
  - delegated_canon_guard_review
  - same_task_canon_registration_when_required
  - archive_manifest_prepare
