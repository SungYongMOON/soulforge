workflow_id: simulation_run_verify_v0
kind: project_binding_template
status: template
project_code: "<project_code>"
simulation_run_verify_run_id: "<run_id>"
inputs:
  prepared_deck_packet_refs:
    - packet_repo_path: "_workmeta/<project_code>/runs/<deck_run_id>/simulation_deck/simulation_deck_prepare_v0/simulation_deck_packet.yaml"
      read_only: true
  measurement_definition_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<measurement_definition_packet>"
      read_only: true
  simulator_policy_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<simulator_policy_packet>"
      read_only: true
approved_simulation_run_policy:
  upstream_packets_are_read_only: true
  blocked_run_is_not_failed_result: true
  verdict_requires_named_measurement_or_rule: true
outputs:
  simulation_run_output_root_repo_path: "_workmeta/<project_code>/runs/<run_id>/simulation_run/simulation_run_verify_v0"
public_boundary:
  commit_project_outputs_to_public_repo: false
  include_raw_waveforms_or_model_payloads_in_workflow_package: false
  use_runtime_absolute_paths_in_workflow_package: false
