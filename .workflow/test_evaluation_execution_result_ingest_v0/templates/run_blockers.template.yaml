      evidence_ref: "<repo_path_or_null>"
      owner_followup_ref: "<owner_followup_id_or_null>"
      rerun_route: verification_plan_from_page_contracts_v0|test_harness_asset_planning_v0|simulation_run_verify_v0|source_gap_followup_packet_v0|owner_decision_packet_v0|manual_owner_action
