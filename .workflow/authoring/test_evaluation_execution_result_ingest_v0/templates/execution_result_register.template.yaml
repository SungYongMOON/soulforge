workflow_id: test_evaluation_execution_result_ingest_v0
kind: execution_result_register_template
status: template
execution_result_register:
  register_id: "<register_id>"
  source_execution_run_packet_ref: "<repo_path>"
  rows:
    - result_row_id: "<result_row_id>"
      execution_item_id: "<execution_item_id>"
      verification_item_id: "<verification_item_id>"
      trace_row_id: "<trace_row_id_or_null>"
      planned_result_ref: "<planned_result_ref_or_null>"
      observed_result_ref: "<project_local_or_private_result_ref_or_null>"
      method: inspection|analysis|physical_test|software_test|demonstration|operational_evaluation_support|simulation_result_ref|not_ready
      criterion_ref: "<criterion_or_rule_ref>"
      observed_value_summary: "<payload_free_summary_or_null>"
      candidate_verdict: pass|fail|inconclusive|blocked|not_executed|not_observed
      verdict_rationale: "<short_rationale>"
      acceptance_state: not_accepted|acceptance_basis_required|owner_review_required|downstream_acceptance_packet_required
      downstream_acceptance_basis_ref: "<acceptance_basis_ref_or_null>"
      discrepancy_refs: []
      owner_followup_refs: []
claim_ceiling:
  register_contains_candidate_rows_only: true
  accepted_rows_must_be_created_by: accepted_verification_result_packet_v0
