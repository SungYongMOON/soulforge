workflow_id: test_evaluation_execution_result_ingest_v0
kind: execution_scope_binding_template
status: template
execution_scope:
  execution_scope_id: "<execution_scope_id>"
  source_verification_plan_id: "<verification_plan_id>"
  target_stage_codes:
    - "150_TRR_DT"
    - "180_FCA_OT"
  scope_refs:
    verification_requirements_matrix_ref: "<repo_path>"
    trr_readiness_handoff_ref: "<repo_path>"
    fca_svr_handoff_index_ref: "<repo_path>"
  execution_items:
    - execution_item_id: "<execution_item_id>"
      verification_item_id: "<verification_item_id>"
      planned_result_ref: "<future_or_expected_result_ref>"
      method: inspection|analysis|physical_test|software_test|demonstration|operational_evaluation_support|simulation_result_ref|not_ready
      criterion_ref: "<criterion_or_rule_ref>"
      baseline_refs: []
      procedure_refs: []
      fixture_or_instrument_refs: []
      environment_or_tool_policy_refs: []
      execution_authorization:
        status: authorized|not_authorized|not_required_result_only_ingest|owner_review_required
        owner_decision_ref: "<owner_decision_ref_or_null>"
      acceptance_basis_ref: "<optional_downstream_acceptance_basis_ref_or_null>"
claim_ceiling:
  execution_scope_binding_is_not_trr_approval: true
  execution_result_rows_are_not_accepted_results: true
  downstream_acceptance_packet_required: true
