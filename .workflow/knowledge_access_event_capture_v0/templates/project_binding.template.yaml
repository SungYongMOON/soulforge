workflow_id: knowledge_access_event_capture_v0
kind: project_binding
status: draft
binding_id: "<binding_id>"
project_ref: "<project_ref>"
knowledge_access_scope:
  scope_id: "<scope_id>"
  target_ref_set: []
  ledger_register_refs: []
  event_source_refs: []
private_output_refs:
  access_ledger_or_register_ref: "<project_local_ledger_or_register_ref>"
  access_event_store_ref: "<project_local_event_store_ref>"
  rollup_store_ref: "<project_local_rollup_store_ref>"
ledger_capture_policy:
  ordinary_work_appends_row: true
  workflow_run_required_per_access: false
  early_capture_mode: manual_agent_entry
  automation_appenders_allowed_later: true
  persisted_rag_answer_retrieve_events_enabled: true
  persisted_rag_answer_pending_receipt_required: true
  persisted_rag_output_occurrence_immutable: true
  wiki_and_general_read_writers_required_separately: true
public_safety_policy:
  store_metadata_only: true
  copy_raw_knowledge_payloads: false
  copy_advisory_answers: false
  host_absolute_paths_allowed: false
retention_label_policy_ref: "<policy_ref>"
retention_importance_guards:
  - authority
  - applicability
  - dependency
  - uniqueness
  - lifecycle_or_conflict
  - access_log_coverage
archive_retire_authority:
  requires_owner_decision_or_declared_policy: true
  owner_decision_refs: []
