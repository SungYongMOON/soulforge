workflow_id: exp_xml_component_materials
kind: project_workflow_binding_template
status: template
project_code: "<project_code>"
inputs:
  exp_xml_repo_path: "_workspaces/<project_code>/inputs/EXP.xml"
  input_scope: whole_export
optional_inputs:
  downstream_handoff_repo_path: "_workspaces/<project_code>/intake_library/downstream_handoff.yaml"
  downstream_handoff_required: false
  owner_approved_local_official_collateral_root_repo_path: null
outputs:
  materials_root_repo_path: "_workspaces/<project_code>/reference_materials/from_exp_xml"
folder_policy:
  parts_folder_name: parts
  datasheet_folder_name: "DATA Sheet"
  eval_folder_name: EVAL
download_policy:
  official_sources_only: true
  owner_approved_local_sources_allowed: true
  random_pdf_mirrors_allowed: false
  allow_vendor_account_pages: false
  url_shortcut_counts_as_download: false
  require_actual_files: true
  require_sha256: true
  max_download_mb_per_part: 250
  max_total_download_mb: 2000
  allowed_official_domains: []
inventory_policy:
  xml_parser: structured_xml_parser
  exp_xml_source_authoritative: true
  page_fragment_allowed: true
  page_fragment_result_scope: page_level_materials_only
  intake_handoff_authority: context_only
  intake_handoff_usage:
    - prioritize_exp_confirmed_connector_or_interface_refs
    - prioritize_exp_confirmed_power_sensitive_refs
    - carry_open_questions_to_review_queue
    - never_confirm_identity_or_connectivity_without_exp_xml_support
  cadence_capture_node_policy:
    placed_component_node: PartInst
    package_definition_node: Package
    instance_property_node: PartInstUserProp
    package_definition_usage: use_for_library_context_only_unless_referenced_by_partinst
  component_property_priority:
    manufacturer:
      - Manufacturer
      - MFR
      - Vendor
    manufacturer_part_number:
      - Manufacturer Part Number
      - MPN
      - Part Number
      - DEVICE
      - Value
    package:
      - Package
      - Footprint
      - PCB Footprint
  weak_identity_action: add_to_review_queue
review_policy:
  require_checksum_manifest: true
  require_source_url_for_each_file: true
  require_none_found_reason: true
  circuit_design_ready_requires:
    - approved_datasheet_or_owner_exception
    - eval_material_or_none_found_recorded
    - no_boundary_review_failures
  page_fragment_ready_label: page_level_source_packet
  page_fragment_must_not_claim_full_design_coverage: true
