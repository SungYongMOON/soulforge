workflow_id: source_gap_followup_packet_v0
kind: project_binding_template
status: template
project_code: <project_code>
source_gap_followup_run_id: <run_id>
inputs:
  upstream_gap_packet_refs:
    - source_workflow_id: official_source_packet_collect_v0
      packet_ref: _workmeta/<project_code>/runs/<upstream_run_id>/<path_to_source_gap_or_followup_packet>
      read_only: true
      authority: gap_or_followup_context_only
    - source_workflow_id: exp_xml_component_materials
      packet_ref: _workmeta/<project_code>/runs/<upstream_run_id>/<path_to_materials_gap_or_review_packet>
      read_only: true
      authority: gap_or_followup_context_only
    - source_workflow_id: component_pcb_layout_guide_extraction
      packet_ref: _workmeta/<project_code>/runs/<upstream_run_id>/<path_to_layout_gap_or_manifest>
      read_only: true
      authority: gap_or_followup_context_only
    - source_workflow_id: page_quantitative_enrichment_v0
      packet_ref: _workmeta/<project_code>/runs/<upstream_run_id>/<path_to_quantitative_gap_or_readiness_delta>
      read_only: true
      authority: gap_or_followup_context_only
    - source_workflow_id: xml_harness_composition_v0
      packet_ref: _workmeta/<project_code>/runs/<upstream_run_id>/<path_to_harness_blocker_or_followup_packet>
      read_only: true
      authority: gap_or_followup_context_only
approved_gap_intake_policy:
  accept_only_oracle_free_gap_packets: true
  hidden_references_allowed: false
  verifier_reports_allowed: false
  accepted_outputs_allowed_as_source: false
  raw_source_payload_text_allowed: false
  agent_may_read_secret_files: false
  owner_files_require_batch_manifest: true
  owner_files_require_owning_workflow_reindex_before_source_use: true
  unsupported_claims_remain_blocked_or_review_required: true
outputs:
  output_root_repo_path: _workmeta/<project_code>/runs/<run_id>/source_gap_followup/source_gap_followup_packet_v0
  source_gap_followup_packet_file: source_gap_followup_packet.yaml
  gap_dedup_index_file: gap_dedup_index.yaml
  owner_action_queue_file: owner_action_queue.yaml
  owner_source_batch_manifest_template_file: owner_source_batch_manifest.template.yaml
  download_or_reuse_batch_manifest_file: download_or_reuse_batch_manifest.yaml
  retry_trigger_register_file: retry_trigger_register.yaml
  downstream_unblock_map_file: downstream_unblock_map.yaml
  boundary_review_note_file: boundary_review_note.md
public_boundary:
  commit_project_outputs_to_public_repo: false
  include_raw_project_payloads_in_workflow_package: false
  include_vendor_text_or_source_payloads_in_workflow_package: false
  use_runtime_absolute_paths_in_workflow_package: false
  agent_may_read_secret_files: false
