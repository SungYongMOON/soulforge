schema_version: source_gap_owner_source_batch_v0
batch_id: <batch_id>
project_code: <project_code>
submitted_by: <owner>
submitted_at: <iso8601_timestamp>
batch_scope:
  aggregate_gap_ids: []
  related_workflows: []
boundary:
  storage_scope: private_run_truth
  public_summary_allowed_default: false
  owner_files_are_not_source_evidence_until_reindexed: true
  agent_must_not_read_secret_values: true
items:
  - item_id: <batch_item_id>
    aggregate_gap_ids: []
    source_kind: datasheet|eval_board|layout_doc|simulation_model|ecad_model|connector_map|owner_constraint|other
    source_origin: official_download|owner_local_file|owner_note|vendor_account_download|tool_export|other
    publisher_or_origin: <publisher_or_owner>
    title_or_description: <summary_without_payload>
    file_path: _workmeta/<project_code>/runs/<run_id>/source_gap_followup/source_inbox/<batch_id>/<file>
    checksum_sha256: <sha256_or_pending>
    approval_scope: human_review_preparation|executor_use|verifier_only
    approved_for_executor: false
    public_summary_allowed: false
    terms_or_license_note: known|unknown|owner_followup_needed
    expected_consumer_workflow: official_source_packet_collect_v0|exp_xml_component_materials|component_pcb_layout_guide_extraction|page_quantitative_enrichment_v0|xml_harness_composition_v0
    owning_workflow_must_reindex_before_use: true
review_gates:
  manifest_maps_every_file_to_aggregate_gap_ids: false
  checksum_recorded_for_local_files: false
  approval_scope_recorded_for_every_item: false
  terms_or_license_status_recorded: false
  no_secret_values_needed_by_agent: true
  ready_for_owning_workflow_reindex: false
