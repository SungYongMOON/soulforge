workflow_id: rag_work_card_router_v0
kind: step_graph
status: draft
steps:
  - step_id: bind_request_fingerprint
    title: Bind Request Fingerprint
    actor_slot: request_fingerprint_binder
    action:
      kind: work_request_label_and_fingerprint_binding
      requires:
        - work_request_label
        - work_request_fingerprint
        - routing_policy
      validates:
        - label_is_public_safe
        - fingerprint_is_present
        - raw_question_not_persisted
        - fingerprint_policy_declared
        - owner_approval_not_claimed
      artifact_out: request_fingerprint_binding
    summary: Bind a public-safe request label and fingerprint while excluding raw question persistence.
    next:
      on_success: inventory_approved_context
      on_fail: stop
  - step_id: inventory_approved_context
    title: Inventory Approved Context
    actor_slot: approved_context_inventory_author
    action:
      kind: approved_source_card_and_index_ref_inventory
      artifacts_in:
        - request_fingerprint_binding
        - approved_source_card_refs
        - approved_index_refs
        - sourcebound_packet_refs
        - metadata_index_refs
        - wiki_curation_refs
      artifact_out: approved_context_inventory
      allowed_content:
        - source_card_ref
        - index_ref
        - source_ref
        - page_ref
        - packet_ref
        - claim_ceiling
        - lifecycle_state
        - route_hint
        - owner_decision_ref
      forbidden_content:
        - raw_question
        - raw_source_text
        - copied_source_excerpt
        - source_chunk_payload
        - notebooklm_answer_payload
        - credential_or_session_material
        - host_absolute_path
    summary: Inventory approved source cards and index refs by stable refs and claim ceilings only.
    next:
      on_success: intake_quality_review_packet
      on_fail: stop
  - step_id: intake_quality_review_packet
    title: Intake Quality Review Packet
    actor_slot: quality_review_intake_author
    action:
      kind: page_quality_review_packet_intake
      artifacts_in:
        - page_quality_review_packet_ref
        - approved_context_inventory
      artifact_out: quality_review_intake
      intake_rules:
        require_status_values:
          - source_supported
          - manual_review
          - blocked
        blocked_pages_excluded_from_source_supported_work: true
        manual_review_pages_marked_visible: true
        table_picture_ocr_page_warnings_preserved: true
        quality_packet_payload_copy_forbidden: true
    summary: Intake the quality packet by ref, status summary, and warning summary without copying payloads.
    next:
      on_success: assemble_deterministic_work_card
      on_fail: stop
  - step_id: assemble_deterministic_work_card
    title: Assemble Deterministic Work Card
    actor_slot: deterministic_work_card_author
    action:
      kind: deterministic_work_card_packet_assembly
      artifacts_in:
        - request_fingerprint_binding
        - approved_context_inventory
        - quality_review_intake
        - routing_policy
      artifact_out: work_card_packet
      derivation_rules:
        derive_card_id_from_fingerprint_policy_and_sorted_ref_set: true
        persist_label_not_raw_question: true
        blocked_quality_refs_cannot_be_used_as_supported_sources: true
        manual_review_refs_remain_flagged: true
        source_supported_refs_do_not_create_owner_approval: true
        deterministic_sorting_required: true
    summary: Build a deterministic work-card packet from the fingerprint, sorted approved refs, and quality status summary.
    next:
      on_success: write_text_boundary
      on_fail: stop
  - step_id: write_text_boundary
    title: Write Text Boundary
    actor_slot: text_boundary_author
    action:
      kind: human_readable_work_card_boundary
      artifacts_in:
        - request_fingerprint_binding
        - approved_context_inventory
        - quality_review_intake
        - work_card_packet
      artifact_out: text_boundary
      boundary_rules:
        human_readable: true
        uses_label_not_raw_question: true
        names_allowed_refs: true
        names_blocked_and_manual_review_refs: true
        states_no_owner_approval_or_canon_claim: true
        states_no_source_truth_or_answer_truth_claim: true
    summary: Write a compact human-readable boundary that explains allowed refs, warning posture, and non-claims.
    next:
      on_success: boundary_review_and_route
      on_fail: stop
  - step_id: boundary_review_and_route
    title: Boundary Review And Route
    actor_slot: router_boundary_reviewer
    action:
      kind: rag_work_card_router_boundary_review_and_downstream_route
      artifacts_in:
        - request_fingerprint_binding
        - approved_context_inventory
        - quality_review_intake
        - work_card_packet
        - text_boundary
      artifact_out: boundary_review_note
      checks:
        - no_raw_question_persistence
        - no_raw_source_text_or_excerpt
        - no_notebooklm_answer_payload
        - no_secret_or_credential_material
        - no_runtime_absolute_paths
        - no_owner_approval_inference
        - no_public_canon_promotion
        - no_default_route_switch
        - deterministic_card_derivation_declared
      routes:
        - rag_metadata_refresh_v0
        - sourcebound_knowledge_packet_operating_loop_v0
        - wiki_curation_maintenance_v0
        - owner_decision_packet_v0
        - post_development_review_gate_v0
    summary: Close with boundary checks and route hints, never with authority upgrades or raw request persistence.
    next:
      on_success: complete
      on_fail: stop
stop_conditions:
  - request_label_missing_or_not_public_safe
  - request_fingerprint_missing
  - raw_question_persistence_requested
  - approved_source_card_refs_missing
  - approved_index_refs_missing
  - page_quality_review_packet_missing
  - blocked_quality_ref_required_for_requested_work
  - owner_approval_required_but_absent
  - canon_or_default_route_claim_requested
  - source_truth_or_answer_truth_claim_requested
  - runtime_absolute_path_or_secret_detected
