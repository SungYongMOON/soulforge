operating_contract:
  owns:
    - request_fingerprint_binding_shape
    - approved_context_inventory_shape
    - quality_review_intake_shape
    - deterministic_work_card_packet_shape
    - human_readable_text_boundary_shape
    - boundary_review_note_shape
  does_not_own:
    - raw_question_storage
    - source_payload_storage
    - copied_source_excerpt_storage
    - notebooklm_answer_storage
    - owner_approval_authority
    - canon_promotion
    - default_route_switching
    - source_truth
    - answer_truth
    - source_card_or_index_construction
    - project_execution_authority
  deterministic_card_contract:
    stable_inputs:
      - work_request_label
      - work_request_fingerprint
      - approved_source_card_refs
      - approved_index_refs
      - page_quality_review_packet_ref
      - routing_policy_ref
    stable_derivation_fields:
      - workflow_id
      - workflow_version
      - request_fingerprint
      - sorted_input_ref_set_hash
      - quality_status_summary
      - route_policy_id
    forbidden_derivation_fields:
      - raw_question_text
      - raw_source_text
      - copied_source_excerpt
      - notebooklm_answer_payload
      - runtime_absolute_path
      - owner_private_note_payload
  boundaries:
    package_public_safe: true
    raw_question_persisted: false
    raw_source_text_persisted: false
    source_chunks_or_excerpts_persisted: false
    notebooklm_answers_persisted: false
    secrets_or_credentials_persisted: false
    runtime_absolute_paths_persisted: false
    owner_approval_granted_here: false
    public_canon_promotion_allowed: false
    default_route_switch_allowed: false
    work_card_is_execution_request_not_authority: true
    text_boundary_is_human_readable_scope_not_source_truth: true
  required_output_shapes:
    request_fingerprint_binding: templates/request_fingerprint_binding.template.yaml
    approved_context_inventory: templates/approved_context_inventory.template.yaml
    quality_review_intake: templates/quality_review_intake.template.yaml
    work_card_packet: templates/work_card_packet.template.yaml
    text_boundary: templates/text_boundary.template.yaml
    boundary_review_note: templates/boundary_review_note.template.yaml
notes:
  - The raw work request may be used only as transient runtime input to produce a public-safe label and fingerprint; it must not be persisted in workflow outputs.
  - The deterministic work card is a scoped task packet. It does not approve work, promote canon, validate source truth, or grant project execution authority.
  - Quality review status controls routing: blocked pages cannot be used for source-supported work cards, and manual-review pages must remain visibly marked.
  - "This package is not registered in .workflow/index.yaml and is not default-route-safe; pilot execution evidence is recorded under history/pilot_execution_20260527.yaml."
