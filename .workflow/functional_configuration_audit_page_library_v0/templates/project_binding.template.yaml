workflow_id: functional_configuration_audit_page_library_v0
kind: project_binding_template
status: template
project_code: "<project_code>"
functional_audit_run_id: "<run_id>"
inputs:
  audit_scope_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<audit_scope_packet>"
      read_only: true
approved_audit_policy:
  upstream_packets_are_read_only: true
  planning_packets_are_not_accepted_results: true
  audit_packet_is_not_acceptance: true
outputs:
  functional_audit_output_root_repo_path: "_workmeta/<project_code>/runs/<run_id>/functional_audit/functional_configuration_audit_page_library_v0"
public_boundary:
  commit_project_outputs_to_public_repo: false
  include_raw_project_payloads_in_workflow_package: false
  use_runtime_absolute_paths_in_workflow_package: false
