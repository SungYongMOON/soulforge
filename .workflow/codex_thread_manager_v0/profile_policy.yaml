selection_rules:
  - Do not hard-code model, species, class, local runtime paths, or thread tool
    availability into this reusable workflow package.
  - Use the active Codex app thread tools only when they are actually available
    in the current runtime.
  - Prefer worktree workers for file mutation lanes that must not disturb the
    foreground checkout.
  - Require separate workflow-check and post-development review evidence before
    claiming stronger readiness.
rerun_triggers:
  - thread tool availability changes
  - manager rollover policy changes
  - worktree worker policy changes
  - worker subagent-first or no-subagent exception policy changes
  - verifier or judge independence policy changes
  - recursive fan-out policy changes
  - local runtime skill bridge changes
  - workflow-check closeout output shape or default-route safety labeling changes
  - live manager-worker pilot exposes boundary ambiguity
  - mini profile gains explicit default_route_safe:no closeout labeling in a
    future fixture
