  - no_real_validator_execution_claim
  - no_real_night_work_handoff_edit
  - no_full_rollover_execution_claim
  - no_worktree_worker_execution_claim
  - no_worker_subagent_first_execution_claim
  - no_forked_implementer_independent_review_claim
  - no_production_ready_claim
  - no_default_route_claim
  - no_default_route_safety_claim
notes:
  - This policy optimizes the model-facing orchestration planning, packet shaping, and conservative closeout portion of the workflow on a public-safe synthetic fixture.
  - Real Codex thread creation, worktree worker execution, manager rollover, and independent verifier behavior still depend on current app tool availability and owner-approved runtime action.
