schema_version: post_development_review_gate_v0.packet
review_id: "<YYYYMMDD_subject_slug>"
created_at: "<iso8601_timestamp>"
owner_scope: "_workmeta/system | _workmeta/<project_code> | private-state | public_repo"
review_level: "self_check | inspector | inspector_and_judge | full_b_v_gate"
trigger_reason:
  - "public_repo_change | private_boundary | workflow_or_skill_change | adoption_decision | promotion_candidate | automation_change | source_packet_or_router_change"

builder_report:
  objective: ""
  changed_files: []
  output_state: "draft | pilot-ready | pilot-executed | canon-ready | registered | blocked"
  commands_run: []
  claimed_benefit: ""
  known_gaps: []

validation_review:
  required: true
  commands_expected: []
  commands_run: []
  result: "pass | fail | blocked | not_applicable"
  findings: []

inspector_review:
  required: true
  reviewer_context: "same_context | fresh_context | fresh_context_preferred | manual_checklist"
  checks:
    allowed_write_paths: "pass | fail | blocked | not_applicable"
    public_private_boundary: "pass | fail | blocked | not_applicable"
    secret_raw_data_absent: "pass | fail | blocked | not_applicable"
    source_support: "pass | fail | blocked | not_applicable"
    git_status_reviewed: "pass | fail | blocked | not_applicable"
    validation_commands: "pass | fail | blocked | not_applicable"
    output_state_named: "pass | fail | blocked | not_applicable"
  result: "pass | fail | blocked"
  findings: []

knowledge_trigger_check:
  required: true
  result: "no_trigger | metadata_only_record | sourcebound_review_candidate | owner_decision_needed"
  five_question_rubric:
    monster_blocker_mission_or_review_used_knowledge_ref: "yes | no | unknown"
    likely_reuse_or_repeated_question: "yes | no | unknown"
    source_approved_or_traceable: "yes | no | unknown"
    contradiction_gap_missing_source_or_owner_decision_seen: "yes | no | unknown"
    weakest_supported_claim_ceiling_named: "observed | source_supported | rejected_or_blocked | not_applicable"
  reason: ""
  refs: []
  ledger_event_refs: []
  candidate_register_refs: []
  suggested_route: "none | knowledge_access_ledger | daily_sweep | sourcebound_review | owner_decision"
  claim_ceiling: "observed | source_supported | rejected_or_blocked | not_applicable"
  authority_boundary:
    metadata_only_signal: true
    not_source_truth: true
    not_ontology_acceptance: true
    not_owner_approval: true
    not_graph_mutation: true
    not_archive_or_retire_execution: true
    not_canon_promotion: true

judge_review:
  required: false
  reviewer_context: "same_context | fresh_context | fresh_context_preferred | manual_checklist"
  compare_against:
    - original_goal
    - existing_pattern
    - simpler_alternative
    - risk_of_not_adopting
  decision: "accept | revise | hold_private | promote_candidate | reject | not_applicable"
  rationale: ""

bv_gate:
  required: false
  executor_context: "fresh_context | not_applicable | blocked"
  verifier_context: "fresh_context | not_applicable | blocked"
  acceptance_contract_ref: ""
  redacted_verdict_ref: ""
  result: "pass | fail | blocked | not_applicable"
  missing_evidence: []

supervisor_decision:
  final_status: "accepted | needs_revision | blocked | owner_decision_required"
  next_action: ""
  canon_promotion_allowed: false
  notes: []
