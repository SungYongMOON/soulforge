schema_version: post_development_review_gate_v0.supervisor_decision
review_id: "<review_id>"
created_at: "<iso8601_timestamp>"
decision:
  final_status: "accepted | needs_revision | blocked | owner_decision_required"
  rationale: ""
  canon_promotion_allowed: false
  production_ready_claim_allowed: false
owner_delegated_canon_policy:
  applicable: false
  policy_refs: []
  owner_decision_refs: []
  promotion_policy_refs: []
  per_item_owner_confirmation_required: true
  policy_grants_target_layer_registration: false
  authority_guard:
    result: "pass | fail | blocked | unknown | not_applicable"
    accepted_authority: "none | owner_decision | owner_delegated_policy"
    refs: []
  decision_creates_owner_approval: false
source_support_guard:
  result: "pass | fail | blocked | unknown | not_applicable"
  allowed_claim_ceiling: "observed | source_supported | validated_private | canon_candidate | canon_entry | rejected_or_blocked"
  refs: []
public_canon_guards:
  owner_surface: "pass | fail | blocked | unknown | not_applicable"
  public_safe_abstraction: "pass | fail | blocked | unknown | not_applicable"
  private_raw_secret_exclusion: "pass | fail | blocked | unknown | not_applicable"
  schema_or_readme_contract: "pass | fail | blocked | unknown | not_applicable"
  changelog_sync_when_applicable: "pass | fail | blocked | unknown | not_applicable"
  validation_or_review_route: "pass | fail | blocked | unknown | not_applicable"
canon_registration:
  canon_registration_required_this_task: false
  canon_registration_completed: false
  target_refs:
    owner_surface: null
    canon_package_refs: []
    canon_entry_refs: []
    schema_refs: []
    readme_refs: []
    changelog_refs: []
    validation_refs: []
  failed_public_canon_guards: []
  claim_ceiling_after_registration: "not_applicable | observed | source_supported | validated_private | canon_candidate | canon_entry | rejected_or_blocked"
required_followups:
  - followup_id: "<followup_id>"
    owner: "builder | inspector | judge | verifier | owner | later_workflow"
    route: "revise | rerun_validator | run_full_b_v_gate | owner_decision_packet | closure_loop | hold_private"
    summary: ""
non_claims:
  - This supervisor decision does not replace specialist validators.
  - This supervisor decision does not make missing private/raw review evidence public-safe.
  - This supervisor decision does not authorize production-ready claims without required B/V evidence.
  - This supervisor decision does not create owner approval or delegated policy.
  - This supervisor decision does not authorize source truth, ontology acceptance, final domain doctrine, external upload, or default route mutation.
