rerun_triggers:
  - checkpoint required fields change
  - compact or clear decision policy changes
  - fresh subagent delegation packet shape changes
  - closeout or knowledge trigger policy changes
  - workflow-check claim ceiling or default-route rules change
  - a live long-thread pilot exposes stale-memory or reset-decision ambiguity
  - mini profile is retested against a fixture that requires strict handoff field placement
