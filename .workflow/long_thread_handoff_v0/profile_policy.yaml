  - no_external_notification_or_route_switch
  - no_pilot_execution_claim
  - no_production_ready_claim
  - no_default_route_claim
notes:
  - This policy optimizes the model-facing handoff, delegation planning, context reset decision, validation-gap accounting, and conservative closeout part of the workflow on a public-safe synthetic fixture.
  - Runtime bridge skills must read this policy at runtime and must not copy optimizer values into local skill bodies.
  - Real long-thread execution still requires current workspace status checks, owner-approved write scope, actual validator results, and separate review evidence before any stronger claim.
