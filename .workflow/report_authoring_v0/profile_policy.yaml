workflow_id: report_authoring_v0
kind: workflow_profile_policy
status: active
runtime_lane_status: candidate
calibration_status: bounded_real_pilot_completed_not_deployment_calibrated
validation_level: strict_contract_synthetic_controls_and_bounded_real_pilot
execution_policy:
  binding_revision: report_authoring_v0.binding.v1
  skills_disabled_inside_fixed_runner_lane: true
  static_handler_only: true
  allowed_modes:
    - full_authoring
    - final_polish
  default_route_enabled: false
  launcher_interview_before_request:
    full_authoring_incomplete_input: one_question_at_a_time_until_material_intake_is_complete
    final_polish: skip_unless_material_ambiguity_would_change_meaning
  shared_runner_entry_condition: material_intake_complete
stage_separation:
  required_executor_stages:
    - protected_claim_baseline
    - draft_or_normalize
    - technical_content
    - evidence_logic
    - derive_executive_summary
    - final_polish
  independent_verifier_required: true
  verifier_actor_run_and_context_must_differ_from_final_rewriter: true
  verifier_checks_all_hash_bound_inputs: true
  identity_separation_attestation_required: true
  human_review_required_before_publishable_or_production_ready: true
policy_loading:
  bundle_digest_verified_before_execution: true
  workflow_owned_policy_files_passed_to_fixed_adapters: true
  installed_skill_runtime_doctrine_dependency: false
quality_policy:
  reader_centered_natural_practitioner_tone: true
  technical_terms_and_qualifiers_preserved: true
  ai_detector_gate: false
  detector_evasion_objective: false
  word_blacklist_gate: false
evidence:
  synthetic_contract_and_preservation_fixtures: passed
  fresh_builder_verifier_cycles_for_this_runtime_revision: 1
  bounded_real_report_pilot: passed_private_observed_partial_human_owner_review_pending
non_claims:
  - no_semantic_guarantee_from_automated_checks
  - no_production_ready_claim
  - no_publishable_claim
  - no_default_route_claim
  - no_worker_or_erp_activation_claim
  - no_model_quality_or_cost_equivalence_claim
promotion_gate:
  - all_required_positive_and_negative_controls_pass
  - at_least_two_fresh_builder_to_verifier_cycles_pass
  - bounded_real_report_human_review_passes
  - post_development_review_level_3_passes_for_authority_change
