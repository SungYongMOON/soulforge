workflow_id: report_authoring_v0
kind: workflow_profile_policy
status: active
calibration_status: not_calibrated
calibration_mode: none
validation_level: structure_plus_fresh_eval_pilot_public_safe
measurement_policy:
  quality_source: fresh_context_evaluator_judge_scenarios
  model_cost_calibration_run: false
  model_cost_calibration_reason: >
    No CLI model-cost calibration matrix was run. The pilot evidence is fresh-context
    evaluator/judge runs that drove the procedure on synthetic public-safe scenarios.
    A CLI quality-equivalence calibration can be added later if a model profile lock is wanted.
pilot_evidence:
  method: fresh_context_evaluator_plus_separate_judge
  fixtures_public_safe_synthetic: true
  scenarios:
    - data_dump_sensor_sensitivity
    - analysis_tradeoff_material_selection
    - progress_report_milestone_slippage
    - exec_presentation_decision_request
    - interview_mode_incomplete_input
  result_summary: >
    Drafting/analysis/progress/interview scenarios passed the judge acceptance
    criteria; the data-dump scenario also caught a worst-case uncertainty margin
    without inventing a verdict. The presentation scenario passed on content
    after an output-hygiene rule was added to suppress working-note leakage.
  evidence_location: run-local subagent transcripts (not copied into public canon)
rerun_triggers:
  - the So-What scaffold, register rules, or report type spines change
  - the conditioned de-slop rule changes
  - the interview question bank changes
  - a live report-authoring pilot exposes boundary ambiguity
non_claims:
  - no_fact_number_or_verdict_created_by_the_workflow
  - no_real_owner_data_used_in_calibration
  - no_production_ready_claim
  - no_default_route_claim
notes:
  - The launcher skill reads this file at runtime and must not copy values into the skill body.
  - This policy records pilot evidence shape only; raw run payloads stay out of public canon.
