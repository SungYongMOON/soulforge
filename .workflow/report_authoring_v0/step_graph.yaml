workflow_id: report_authoring_v0
kind: step_graph
status: active
steps:
  - step_id: validate_request
    title: Validate exact request and fixed binding
    actor_slot: intake_scanner
    action:
      kind: exact_contract_and_static_allowlist_validation
      consumes:
        - opaque_input_refs_only
        - runtime_binding.json
      rejects:
        - unknown_fields
        - inline_body_or_path
        - caller_prompt_command_or_module
        - non_allowlisted_workflow_or_mode
        - bundle_digest_mismatch
    next:
      on_success: intake_and_gap_scan
      on_fail: stop
  - step_id: intake_and_gap_scan
    title: Intake and gap scan
    actor_slot: intake_scanner
    action:
      kind: bounded_payload_intake
      rules:
        - full_authoring_requires_source_material
        - final_polish_requires_only_draft_report
        - owner_contract_source_material_and_semantic_manifest_are_optional_strengthening_for_final_polish
        - semantic_manifest_is_optional_for_both_modes
        - verify_declared_size_and_sha256
    next:
      on_success: protected_claim_baseline
      on_fail: stop
  - step_id: protected_claim_baseline
    title: Generate or strengthen protected-claim baseline
    actor_slot: protected_claim_builder
    action:
      kind: protected_semantic_manifest_generation
      output: protected_semantic_manifest
      rules:
        - use_optional_supplied_manifest_when_exact_and_source_bound
        - otherwise_generate_from_source_material_or_input_draft
        - cover_number_sign_value_unit_comparator_range_uncertainty
        - cover_dates_ids_citations_table_bindings_negation_comparison_modality
        - cover_attribution_roles_conditions_scope_causality_verdict_unconfirmed
        - preserve_association_and_multiplicity
        - generated_manifest_does_not_claim_complete_semantic_extraction
    next:
      on_success: draft_or_normalize
      on_fail: stop
  - step_id: draft_or_normalize
    title: Draft or normalize the report body
    actor_slot: report_drafter
    action:
      kind: report_document_v1_draft
      modes:
        full_authoring: draft_from_source_material
        final_polish: load_or_normalize_input_draft
      rules:
        - use_fixed_workflow_report_and_tone_policy
        - no_missing_fact_number_citation_role_cause_or_verdict_invention
        - body_first_authoring
        - summary_has_no_final_authority_before_body_reviews
    next:
      on_success: technical_content_review
      on_fail: stop
  - step_id: technical_content_review
    title: Technical-content review
    actor_slot: technical_content_reviewer
    action:
      kind: technical_content_review
      reference: references/technical_content_review.md
      output: technical_content_review_result
    next:
      on_success: evidence_logic_review
      on_gap: stop
      on_fail: stop
  - step_id: evidence_logic_review
    title: Evidence-logic review
    actor_slot: evidence_logic_reviewer
    action:
      kind: evidence_logic_review
      reference: references/evidence_logic_review.md
      output: evidence_logic_review_result
    next:
      on_success: derive_executive_summary
      on_protected_delta: technical_content_review
      on_fail: stop
  - step_id: derive_executive_summary
    title: Derive the reader summary from the verified body
    actor_slot: summary_deriver
    action:
      kind: body_claim_bound_summary_derivation
      output: summary_derivation_record
      rules:
        - body_must_already_pass_technical_content_and_evidence_logic
        - every_summary_paragraph_or_bullet_item_has_body_claim_refs
        - summary_derivation_cannot_change_verified_body
        - later_body_claim_change_invalidates_summary
    next:
      on_success: final_polish
      on_fail: stop
  - step_id: final_polish
    title: Final polish
    actor_slot: final_rewriter
    action:
      kind: reader_centered_final_polish
      reference: references/final_polish_policy.md
      output: final_report_document
      rules:
        - natural_practitioner_tone
        - keep_technical_terms_and_qualifiers
        - no_ai_detector_or_word_blacklist_gate
        - no_protected_meaning_change
    next:
      on_success: deterministic_preservation
      on_fail: stop
  - step_id: deterministic_preservation
    title: Deterministic preservation check
    actor_slot: deterministic_preservation_checker
    action:
      kind: association_and_multiplicity_aware_semantic_diff
      reference: references/semantic_preservation_policy.md
      outputs:
        - preservation_audit
      rules:
        - default_tolerance_zero
        - final_polish_protects_all_detected_draft_tokens
        - full_authoring_protects_technical_content_adopted_tokens
        - new_numeric_date_identifier_citation_or_table_cell_surface_blocks
        - verify_declared_surface_anchors
        - automation_does_not_guarantee_semantics
    next:
      on_success: independent_semantic_verification
      on_protected_delta: technical_content_review
      on_fail: stop
  - step_id: independent_semantic_verification
    title: Independent semantic verification
    actor_slot: independent_semantic_verifier
    action:
      kind: source_to_final_semantic_verification
      output: semantic_verification
      rules:
        - verifier_actor_differs_from_final_rewriter
        - verifier_run_differs_from_final_rewriter
        - unresolved_difference_blocks_success
        - no_self_confirmation
    next:
      on_success: validate_and_render
      on_fail: stop
  - step_id: validate_and_render
    title: Validate ReportDocumentV1 and render
    actor_slot: renderer
    action:
      kind: strict_document_validation_and_deterministic_render
      consumes:
        - final_report_document
      outputs:
        - final_report_md
        - final_report_html
      rules:
        - reject_unknown_fields
        - deterministic_markdown
        - escaped_standalone_html
        - no_remote_assets_or_scripts
    next:
      on_success: boundary_and_receipt
      on_fail: stop
  - step_id: boundary_and_receipt
    title: Boundary and metadata-only receipt
    actor_slot: boundary_and_receipt_reviewer
    action:
      kind: final_boundary_and_receipt
      outputs:
        - final_report
        - audit_artifact_refs
        - workflow_receipt_metadata
      rules:
        - atomic_no_overwrite_artifact_set
        - artifacts_under_workspace_or_approved_worksite
        - workmeta_pointer_hash_size_status_receipt_only
        - receipt_confirmation_required_before_succeeded
        - publish_requires_later_independent_human_review
    next: []
stop_conditions:
  - exact_contract_or_bundle_validation_fails
  - input_hash_size_or_boundary_validation_fails
  - protected_claim_baseline_cannot_be_generated_without_invention
  - missing_or_conflicting_evidence_remains
  - protected_semantic_delta_is_unresolved
  - independent_verifier_is_missing_or_self_confirms
  - document_render_or_atomic_write_fails
  - receipt_sink_is_unavailable
  - private_payload_secret_or_runtime_path_would_enter_metadata_receipt
  - publish_owner_approval_or_default_route_is_requested
