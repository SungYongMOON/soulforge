workflow_id: report_authoring_v0
kind: workflow
status: active
title: Report Authoring v0
summary: >
  Candidate fixed-bundle workflow for full report authoring or final polish. It
  generates a protected-claim baseline from approved source material or the input
  draft, separates technical-content, evidence-logic, and final-polish passes,
  requires deterministic preservation plus an independent semantic verifier, and
  emits a first-class final report separately from audit artifacts. Automated
  checks do not guarantee semantic preservation.
entrypoint: run
execution_mode: fixed_bundle_skills_disabled
runtime_binding: runtime_binding.json
role_slots: role_slots.yaml
step_graph: step_graph.yaml
handoff_rules: handoff_rules.yaml
monster_rules: monster_rules.yaml
party_compatibility: party_compatibility.yaml
profile_policy: profile_policy.yaml
history: history/
calibrations: calibrations/
global_invocation:
  primary_alias: report_writer
  slash_alias: /report-writer
  resolves_to_workflow_id: report_authoring_v0
  status: registered_alias_candidate_runtime
  notes:
    - The alias does not enable a default route or grant source, verdict, publish, or approval authority.
inputs:
  required_by_mode:
    full_authoring:
      - source_material_ref
    final_polish:
      - draft_report_ref
  optional_strengthening:
    - owner_contract_ref
    - source_material_ref
    - semantic_manifest_ref
outputs:
  user_deliverables:
    - final_report_md
    - final_report_html_optional
  audit_artifacts:
    - report_document_json
    - protected_semantic_manifest
    - preservation_audit
    - semantic_verification
    - editorial_pass_records
    - summary_derivation_record
    - workflow_receipt_metadata
validation_level: strict_contract_synthetic_controls_and_bounded_real_pilot
registration_policy: existing_registration_no_maturity_promotion
output_state: pilot-executed
classification_lane:
  primary: project_management
  primary_name_ko: 프로젝트 관리
  secondary:
    - documentation
    - quality_review
  secondary_name_ko:
    - 문서화
    - 품질 검토
  purpose: discovery_only
  authority: none
execution_binding:
  party_required: false
  candidate_party_id: null
  bound_party_id: null
  binding_authority: none
workflow_modes:
  - full_authoring
  - final_polish
runtime_contract:
  workflow_id: report_authoring_v0
  binding_revision: report_authoring_v0.binding.v1
  handler_id: report_authoring_v0
  skills_disabled: true
  caller_entrypoint_allowed: false
  default_route_enabled: false
  input_body_inline_allowed: false
  input_path_inline_allowed: false
  caller_prompt_or_command_allowed: false
  request_schema: contracts/workflow_job_request.v1.schema.json
  state_schema: contracts/workflow_job_state.v1.schema.json
  result_schema: contracts/workflow_job_result.v1.schema.json
  receipt_schema: contracts/workflow_receipt.v1.schema.json
  report_document_schema: contracts/report_document.v1.schema.json
report_authoring_contract:
  owns:
    - fixed_report_and_tone_policy
    - protected_claim_baseline_generation
    - technical_content_review
    - evidence_logic_review
    - body_verified_summary_derivation
    - adaptive_report_type_structure
    - sentence_level_body_claim_binding
    - final_polish
    - deterministic_semantic_preservation
    - exact_protected_anchor_and_surface_preservation
    - independent_semantic_verification_requirement
    - deterministic_markdown_and_escaped_html_render
    - final_deliverable_and_audit_artifact_separation
    - metadata_only_receipt_shape
  does_not_own:
    - source_truth_or_missing_fact_creation
    - owner_contract_or_publish_approval
    - semantic_guarantee_from_automation
    - default_routing_or_external_send
    - project_share_writeback
  doctrine_refs:
    editorial_contract: references/editorial_contract.md
    editorial_research_basis: references/editorial_research_basis.md
    report_writing_guide: docs/architecture/workspace/SOULFORGE_REPORT_WRITING_GUIDE_V0.md
    report_format: docs/architecture/workspace/SOULFORGE_REPORT_FORMAT_V0.md
    interview_protocol: references/interview_protocol.md
    technical_content_review: references/technical_content_review.md
    evidence_logic_review: references/evidence_logic_review.md
    final_polish_policy: references/final_polish_policy.md
    semantic_preservation_policy: references/semantic_preservation_policy.md
  authority_boundary:
    facts_numbers_verdicts_remain_owner_or_source: true
    semantic_manifest_may_be_generated_from_source_or_draft: true
    caller_supplied_manifest_is_optional_strengthening: true
    independent_verifier_required_for_success: true
    independent_human_review_required_before_publishable_or_production_ready: true
    automated_checks_claim_semantic_guarantee: false
    report_date_nullable_and_never_invented: true
    v0_content_classification_fixed_to_private_work_product: true
    draft_only_claim_ceiling_observed: true
    authorized_unit_conversion_citation_renumber_or_protected_move_supported: false
    local_identity_claim_observes_actor_or_process_independence: false
    report_bodies_or_artifacts_in_workmeta: false
    workmeta_receipt_metadata_only: true
notes:
  - The package remains registered in `.workflow/index.yaml`; this evolution does not change that path or index entry.
  - One fresh Builder/Verifier cycle and one bounded real final-polish pilot passed; human owner review and deployment calibration remain open.
  - Natural reader-centered practitioner tone is used without an AI detector, detector-evasion target, or word blacklist.
