selection_rules:
  - Deterministic filesystem and DB Doctor validation dominate model profile choice.
  - Use conservative reasoning when mutating real owner data or classifying conversion blockers.
  - Require owner approval before running against a full archive or non-default extension set.
  - Use the primary profile for public-safe synthetic packet generation and routine dry-run planning.
  - Use the C04R shadow when quality margin matters more than model-tier cost.
  - Escalate to C02 or a fresh calibration when changing the output section contract, success classifier, or mutation authority.
rerun_triggers:
  - DB Doctor command behavior changes
  - supported extension policy changes
  - old/new packet shape changes
  - full-archive pilot is authorized
  - conversion success classifier changes
  - required output section names change
  - primary or shadow profile fails the strict workflow_output_packet shape gate
calibration_archive_ref: calibrations/cal_20260521_cli_quality_equiv_001/
calibration_notes:
  - The archive is based on a public-safe synthetic fixture and does not contain real PCB payloads, runtime absolute paths, private project material, or secrets.
  - Default subagent quality-first mode was blocked by current runtime policy, so quality and telemetry are labeled as CLI-only calibration evidence.
  - The selected profile is not a production-ready unattended full-archive conversion claim.
non_claims:
