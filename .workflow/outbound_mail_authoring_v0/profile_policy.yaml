notes:
  - The launcher skill must read this file at runtime and must not copy optimizer values into the skill body.
  - This policy optimizes the model-facing drafting, boundary review, and owner handoff planning part of the workflow on a public-safe synthetic fixture.
  - Real outbound mail execution still requires owner-approved recipients, subject, body, attachments, footer handling, and send surface before any external action.
