schema_version: outbound_mail_readability_preset_v1
preset_id: owner_outlook_readability_v1
status: active
purpose: public_safe_render_and_application_handoff
selection:
  default_for:
    - action_brief
    - decision_brief
    - status_change
    - reply_map
  compact_mode_policy: preserve_compact_body_without_forced_sections
structure:
  priority_section:
    title: "요청사항"
    position: first
    independent: true
    numbered_heading: true
    consumes_sequence_number: true
    include_when: requested_action_or_reply_deadline_present
  numbered_section_headings:
    enabled: true
    start: 1
    contiguous: true
    include_priority_section_when_present: true
    omit_empty_sections: true
    renumber_after_omission: true
  bullets:
    use_for: parallel_items
  tables:
    use_for: repeated_fields_or_three_or_more_related_values
    layout:
      width_mode: fixed
      default_width_pt: 470
      maximum_width_pt: 470
      horizontal_alignment: left
      auto_fit_to_window: false
      wrap_cell_text: true
      column_sizing: content_weighted_within_fixed_width
      outlook_word_width_unit: points
      outlook_word_preferred_width_type:
        name: wdPreferredWidthPoints
        value: 3
      persistence_verification: verify_after_save_close_and_reopen
      owner_explicit_width_override:
        allowed: true
        verification: verify_actual_table_width_matches_owner_selected_width_before_save
      application_verification:
        default: verify_actual_table_width_at_or_below_maximum_before_save
        owner_override: verify_actual_table_width_matches_owner_selected_width_before_save
      selection_precedence:
        - owner_explicit_width_override
        - matching_semantic_profile
        - generic_default
      semantic_profiles:
        request_work_three_column:
          applies_when:
            owner_explicit_width_override_absent: true
            exact_columns:
              - "담당자"
              - "요청 업무"
              - "완료·회신 기준"
            shared_reason_or_context_is_rendered_outside_table: true
          total_width_pt: 580
          overrides_generic_maximum_width: true
          column_widths_pt:
            assignee: 90
            requested_work: 225
            completion_or_reply_criteria: 265
          completion_or_reply_criteria_is_widest: true
          verification: verify_profile_widths_after_save_close_and_reopen
    request_work_columns:
      preferred:
        - "담당자"
        - "요청 업무"
        - "완료·회신 기준"
      optional_when_row_specific_and_readable:
        - "확인 목적 또는 요청 사유"
        - "요청 기한(값이 있을 때만)"
  follow_up_section:
    include_when: supported_nonempty_follow_up_exists
typography:
  color:
    authored_content: black
    inherit_reply_thread_color: false
    applies_to: [body, headings, bullets, tables, table_cells]
    application_verification: verify_each_authored_paragraph_and_table_cell_before_save
  body:
    font_family: "Malgun Gothic"
    font_size_pt: 10
  headings:
    font_family: "Malgun Gothic"
    font_size_pt: 11
    bold: true
    space_before_pt: 12
    space_after_pt: 6
    bottom_rule: true
  bullets_and_tables:
    font_family: "Malgun Gothic"
    font_size_pt: 10
    spacing: inherit_body
application_handoff:
  authoring_output: readability_render_plan
  application_surface: separate_owner_approved_outlook_draft_executor
  outlook_mutation_by_authoring_workflow: forbidden
  owner_approval_required_before_draft_mutation: true
  external_send_by_authoring_workflow: forbidden
  signature_footer_payload_source: runtime_private_only
  public_package_stores_signature_footer_payload: false
