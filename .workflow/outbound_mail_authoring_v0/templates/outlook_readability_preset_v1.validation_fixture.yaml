fixture_id: outbound_mail_readability_preset_public_001
fixture_kind: public_synthetic_render_handoff
preset_id: owner_outlook_readability_v1
input:
  render_mode: action_brief
  requested_action: "합성 검토 항목을 확인하고 결과를 회신"
  reply_deadline: "승인된 응답 기한"
  table_width_selection_cases:
    - case_id: owner_override_wins
      columns: ["담당자", "요청 업무", "완료·회신 기준"]
      shared_reason_or_context_is_rendered_outside_table: true
      owner_explicit_width_override_pt: 540
      expected_policy: owner_explicit_width_override
    - case_id: matching_semantic_profile
      columns: ["담당자", "요청 업무", "완료·회신 기준"]
      shared_reason_or_context_is_rendered_outside_table: true
      expected_policy: request_work_three_column
    - case_id: generic_default
      columns: ["항목", "적용·확인 내용", "비고"]
      shared_reason_or_context_is_rendered_outside_table: false
      expected_policy: generic_default
  sections:
    - title: "기술 조건"
      table:
        columns: ["항목", "적용값", "비고"]
        rows:
          - ["합성 조건 A", "승인값 A", "확인"]
          - ["합성 조건 B", "승인값 B", "확인"]
    - title: "실행 및 시험"
      ordered_items:
        - "합성 단계 1 수행"
        - "합성 단계 2 수행"
    - title: "회신 요청 자료"
      bullet_items:
        - "revision 정보"
        - "측정 결과"
    - title: "첨부"
      bullet_items: []
    - title: "후속 조치"
      bullet_items: []
expected:
  visible_section_order:
    - "1. 요청사항"
    - "2. 기술 조건"
    - "3. 실행 및 시험"
    - "4. 회신 요청 자료"
  omitted_sections:
    - "첨부"
    - "후속 조치"
  typography:
    body: {font_family: "Malgun Gothic", font_size_pt: 10}
    headings: {font_family: "Malgun Gothic", font_size_pt: 11, bold: true, space_before_pt: 12, space_after_pt: 6, bottom_rule: true}
    bullets_and_tables: {font_family: "Malgun Gothic", font_size_pt: 10, spacing: inherit_body}
  tables:
    width_mode: fixed
    default_width_pt: 470
    maximum_width_pt: 470
    horizontal_alignment: left
    auto_fit_to_window: false
    wrap_cell_text: true
    column_sizing: content_weighted_within_fixed_width
    outlook_word_width_unit: points
    outlook_word_preferred_width_type:
      name: wdPreferredWidthPoints
      value: 3
    persistence_verification: verify_after_save_close_and_reopen
    owner_explicit_width_override:
      allowed: true
      verification: verify_actual_table_width_matches_owner_selected_width_before_save
    application_verification:
      default: verify_actual_table_width_at_or_below_maximum_before_save
      owner_override: verify_actual_table_width_matches_owner_selected_width_before_save
    selection_precedence:
      - owner_explicit_width_override
      - matching_semantic_profile
      - generic_default
    semantic_profiles:
      request_work_three_column:
        applies_when:
          owner_explicit_width_override_absent: true
          exact_columns: ["담당자", "요청 업무", "완료·회신 기준"]
          shared_reason_or_context_is_rendered_outside_table: true
        total_width_pt: 580
        overrides_generic_maximum_width: true
        column_widths_pt:
          assignee: 90
          requested_work: 225
          completion_or_reply_criteria: 265
        completion_or_reply_criteria_is_widest: true
        verification: verify_profile_widths_after_save_close_and_reopen
  handoff:
    authoring_workflow_mutates_outlook: false
    owner_approved_separate_executor_required: true
    authoring_workflow_sends_mail: false
    exact_signature_footer_payload_present: false
