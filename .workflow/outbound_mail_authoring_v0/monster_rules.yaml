workflow_id: outbound_mail_authoring_v0
kind: monster_rules
status: active
triggers:
  - the owner asks Codex to write, draft, revise, or prepare an outbound business email
  - the owner asks for a new project email subject using a real project mail keyword
  - the owner asks for a reply or forward draft that preserves an existing thread subject
  - an outbound mail needs a pre-send checklist before Outlook manual send or Soulforge send-mail handoff
  - a draft must match the owner's concise Korean business mail style and include mandatory signature/security footer handling
non_triggers:
  - Outlook sent/received ledger reconciliation
  - Outlook folder creation, movement, cleanup, or rule editing
  - inbox triage, raw body extraction, `.msg` export, or attachment archiving
  - legal, contract, purchasing, or official external submission requiring separate company form or approval
  - automatic recurring status mail without a separate approved automation scope
classification_rules:
  - if the request asks to send immediately but recipient, subject, body, attachment, send surface, or footer state is unclear, keep the result `draft_only`.
  - if the request is a reply or forward, preserve the existing thread subject and do not add a new project keyword unless the owner explicitly asks.
  - if the request is a new project mail, require a confirmed project mail keyword before producing a final subject.
  - if only an internal project code is known, stop for keyword confirmation rather than using that code in the outgoing subject.
  - if footer template is unavailable outside Outlook, produce the draft and mark `서명/보안 footer 확인 필요`.
  - if the request needs Outlook metadata reconciliation after sending, hand off to `outlook_mail_reconcile_v0` after the mail exists.
