workflow_id: outbound_mail_authoring_v0
kind: workflow
status: active
title: Outbound Mail Authoring v0
summary: Public-safe registered workflow for drafting owner-style outbound business mail, binding project mail keywords, applying the mail style policy, checking mandatory signature and security footer, and preparing owner-approved send handoff without granting external send authority by default.
entrypoint: run
execution_mode: local_tool_sequence
role_slots: role_slots.yaml
step_graph: step_graph.yaml
handoff_rules: handoff_rules.yaml
monster_rules: monster_rules.yaml
party_compatibility: party_compatibility.yaml
profile_policy: profile_policy.yaml
history: history/
calibrations: calibrations/
global_invocation:
  primary_alias: outbound_mail
  slash_alias: /outbound-mail
  resolves_to_workflow_id: outbound_mail_authoring_v0
  status: owner_requested_registration_alias
  notes:
    - The alias is a human invocation label. It does not grant unattended sending, Outlook mutation, or default-route authority.
inputs:
  - mail_authoring_request
  - mail_send_style_policy_ref
  - project_mail_keyword_policy_ref
  - owner_footer_policy_ref
optional_inputs:
  - owner_voice_profile_ref
  - owner_voice_profile_provenance
  - team_mail_context_ref
  - communication_intent
  - render_mode_preference
  - channel_risk_flags
  - existing_thread_subject
  - project_local_mail_subject_rule_ref
  - active_project_keyword_index_ref
  - attachment_metadata_refs
  - attachment_selection_policy_ref
  - owner_provided_subject
  - owner_provided_body_facts
  - owner_decision_refs
  - post_send_metadata_record_ref
  - requested_outlook_control_surface
  - outlook_draft_source_ref
  - attachment_password_handling_instruction
outputs:
  - mail_authoring_scope
  - project_keyword_resolution
  - subject_candidate
  - owner_style_body_draft
  - mail_render_plan
  - readability_render_plan
  - attachment_selection_basis
  - footer_application_state
  - pre_send_checklist
  - owner_approval_gate_result
  - send_surface_handoff
  - outlook_draft_application_handoff
  - outlook_draft_executor_selection
  - metadata_record_plan
  - boundary_review_note
validation_level: pilot_executed_private_application
registration_policy: owner_requested_registration
output_state: registered
classification_lane:
  primary: operations
  primary_name_ko: 운영
  secondary:
    - mail_management
    - project_management
    - metadata_governance
  secondary_name_ko:
    - 메일 관리
    - 프로젝트 관리
    - 메타데이터 거버넌스
  purpose: discovery_only
  authority: none
execution_binding:
  party_required: false
  candidate_party_id: null
  bound_party_id: null
  binding_authority: none
workflow_modes:
  - draft_only
  - owner_review_ready
  - owner_approved_send_handoff
  - reply_draft
  - forward_draft
  - new_mail_draft
field_semantics:
  send_surface: requested_delivery_surface_not_authority
  owner_approval_gate_result: authority_state
  team_mail_context_output_schema: outbound_team_mail_context_v1_only
  compatibility_note: Keep existing field names in v0 packets; consumers must not infer send authority from `outlook_manual` or `soulforge_send_mail`.
upstream_workflows:
  - workflow_id: outlook_mail_reconcile_v0
    expected_outputs:
      - project_mail_history_metadata_context
      - sent_mail_metadata_context
    status: optional_metadata_context
  - workflow_id: owner_decision_packet_v0
    expected_outputs:
      - scoped_owner_decision
    status: optional_approval_context
downstream_workflows:
  - workflow_id: outlook_mail_reconcile_v0
    expected_input: sent_mail_metadata_after_owner_send
    status: optional_post_send_reconciliation
  - workflow_id: post_development_review_gate_v0
    expected_input: workflow_or_policy_change_packet
    status: required_before_public_or_canon_policy_change
outbound_mail_authoring_contract:
  owns:
    - mail_authoring_scope_binding
    - optional_owner_voice_profile_binding
    - team_mail_context_normalization
    - project_keyword_resolution
    - subject_candidate_generation
    - owner_style_body_draft_generation
    - adaptive_body_render_mode_selection
    - attachment_selection_gate
    - mandatory_footer_check
    - pre_send_checklist
    - owner_approval_gate
    - send_surface_handoff_packet
    - outlook_draft_executor_selection
    - metadata_record_plan
    - boundary_review_note
  does_not_own:
    - external_send_without_current_owner_approval
    - Outlook_folder_or_rule_mutation
    - Outlook_send_button_click_without_owner_instruction
    - raw_mail_body_archive
    - raw_html_body_archive
    - msg_or_eml_export
    - attachment_payload_storage
    - automatic_send_of_unselected_collected_attachments
    - secret_or_credential_inspection
    - project_keyword_canon_truth
    - footer_template_source_truth
    - public_project_mail_data_publication
    - default_route_switching
  style_policy_refs:
    mail_send_style_policy: docs/architecture/workspace/MAIL_SEND_STYLE_POLICY_V0.md
    team_mail_context_template: templates/team_mail_context.template.yaml
    mail_render_policy: templates/mail_render_policy.template.yaml
    outlook_readability_preset: templates/outlook_readability_preset_v1.yaml
    technical_action_brief_example: templates/technical_action_brief.example.md
    mail_send_runner_policy: docs/architecture/workspace/MAIL_SEND_V0.md
    mail_send_capsule: guild_hall/gateway/mail_send/
  project_keyword_policy:
    subject_bracket_owner: project_mail_keyword
    internal_project_code_in_subject: forbidden
    internal_project_code_in_body: forbidden_unless_owner_explicitly_requests_external_visible_code
    project_code_usage: internal_metadata_only
    new_subject_format: "[<project_mail_keyword>] <mail_kind> - <detail>"
    reply_or_forward_subject_rule: preserve_existing_thread_subject
    keyword_resolution_order:
      - existing_thread_bracket_keyword
      - project_local_mail_subject_rule
      - active_project_keyword_index
      - owner_current_request_keyword
      - stop_for_owner_confirmation
  footer_policy:
    required_for_final_send: true
    required_blocks:
      - signature_block
      - company_security_notice_block
    exact_count_each: 1
    public_workflow_stores_footer_body: false
    preferred_outlook_signature:
      logical_name: "서명+보안"
      runtime_resolution: match_Outlook_signature_name_by_logical_prefix
      exact_account_suffix_public_storage: forbidden
      required_for_outlook_manual_send: true
    source_of_truth:
      - Outlook_default_signature
      - owner_approved_local_private_footer_template
    missing_template_policy: draft_only_with_footer_confirmation_gap
  authority_levels:
    draft_only:
      allowed:
        - subject_and_body_draft
        - assumptions
        - pre_send_checklist
      forbidden:
        - external_send
        - final_recipient_assertion_without_owner_input
    owner_review_ready:
      allowed:
        - copy_ready_body_when_recipients_subject_body_attachment_and_footer_are_bound
      forbidden:
        - send_without_owner_approval
    owner_approved_send_handoff:
      allowed:
        - prepare_outlook_manual_send_handoff
        - prepare_soulforge_send_mail_handoff
      requirements:
        - owner_approved_recipients
        - owner_approved_subject
        - owner_approved_body
        - owner_approved_selected_attachments_or_no_attachments
        - duplicate_or_superseded_attachments_excluded_or_explicitly_approved
        - owner_approved_send_surface
        - footer_blocks_present_once
      forbidden:
        - adding_recipients
        - changing_attachments
        - extending_body_with_unapproved_claims
  required_input_shapes:
    mail_authoring_request: templates/mail_authoring_request.template.yaml
    team_mail_context: templates/team_mail_context.template.yaml
    mail_render_policy: templates/mail_render_policy.template.yaml
    project_mail_keyword_ref: templates/project_mail_keyword_ref.template.yaml
  team_mail_context_compatibility:
    canonical_output_schema: outbound_team_mail_context_v1
    normalizer_script: scripts/normalize_team_mail_context.mjs
    accepted_input_schemas:
      - outbound_team_mail_context_v1
      - outbound_team_mail_context_v0
    output_policy: emit_v1_only
    v0_normalization:
      direct_mappings:
        recipient_role: recipients.to[0].role
        reason_or_purpose: mail_reason
        requested_action.work: requested_work[0].work_items[0]
        facts_or_background: facts
        attachments_or_share_state.items: attachments.items
        attachments_or_share_state.state: attachments.state
        response_needed.required: response_requirements.required
        response_needed.requested_content: response_requirements.requested_content
        source_basis: source_basis
        public_safety: public_safety
      guarded_mappings:
        - Map `requested_action.owner` to `requested_work[0].assignee` only when source semantics explicitly identify the actual assignee; otherwise keep the assignee null and preserve the source path and value in assumptions.
        - Convert each `participating_groups` value to a participant role only when it is role-only; leave involvement null and add an assumption.
        - Map `schedule_or_deadline.requested_by` to `schedule.deadline_or_reply_by` only when the value is unambiguously a deadline or reply-by value.
        - Map `response_needed.requested_by` only when it unambiguously identifies a role or a reply-by value; otherwise preserve its source path and value in assumptions.
        - Preserve `schedule_or_deadline.current_state` in assumptions unless its meaning is explicitly identified as before or after.
        - Preserve each non-null `changes_before_after` path and value in assumptions unless an approved source explicitly identifies the change domain as schedule; do not coerce generic before/after values into schedule fields.
      ambiguity_policy:
        - Preserve unsupported or ambiguous public-safe source path and value in assumptions.
        - Keep unresolved assignees null and add an assumption; never infer an assignee from a recipient or participant.
        - Merge all derived keyword, recipient, attachment, footer, approval, and normalization gaps into the v1 assumptions array before draft rendering, checklist construction, or handoff.
        - Keep rendered assumptions synchronized with the v1 assumptions array; a separate-only assumption is invalid.
        - Never emit both v0 and v1 fields in one normalized packet.
        - Keep authority state draft_only while a required mapping remains unresolved.
      unsafe_input_policy:
        - Stop normalization when contact values, raw mail excerpts, exact footer payloads, private paths, or private project rows are present.
        - Enforce declared public-safety flags and deterministic value-level detection for email or phone contact values, concrete absolute or private runtime paths, quoted-mail header chains, and footer-security payload indicators.
        - Do not copy unsafe values into assumptions or public outputs.
  owner_voice_profile_policy:
    required: false
    expected_scope: local_private_aggregate_traits_only
    default_runtime_identity: owner_outlook_mail_v0
    runtime_resolution_scope: local_private_only
    provenance_required_when_used: true
    fallback_when_missing: public_mail_style_policy_only
    public_copy_forbidden:
      - exact_sample_sentences
      - contact_values
      - raw_addresses
      - exact_footer_payload
      - private_project_rows
  adaptive_render_policy:
    selector_script: scripts/select_mail_render_mode.mjs
    selector_fixture: templates/mail_render_policy.validation_fixture.yaml
    readability_preset:
      preset_id: owner_outlook_readability_v1
      reference: templates/outlook_readability_preset_v1.yaml
      validation_fixture: templates/outlook_readability_preset_v1.validation_fixture.yaml
      validator: scripts/validate_outlook_readability_preset.mjs
      selection_policy: apply_by_default_to_structured_modes_without_restatement
      compact_mode_policy: preserve_compact_body_without_forced_sections
      render_only_authority: true
    metadata_source_of_truth: outbound_team_mail_context_v1
    visible_body_is_not_metadata_source_truth: true
    modes: [compact, action_brief, decision_brief, status_change, reply_map]
    compact_mode_eligibility: pure_share_without_requested_work_confirmation_review_decision_or_required_response
    actionable_request_default: action_brief_even_for_one_assignee_and_one_work_item
    action_brief_visible_fields: [수신, 사유, 목적, 요청업무, 회신기한, 완료회신기준, 비고]
    structured_action_mail:
      core_visible_fields: [수신, 사유, 목적, 요청업무, 회신기한, 완료회신기준]
      conditional_blocks:
        - 변경전후
        - 변경요청사유
        - 적용방안
        - 적용대상품
        - 검토사안
        - 참여부서
        - 첨부
        - 비고
      action_mail_recipient_policy: display_name_or_role_only_never_raw_address
      missing_material_deadline_policy: keep_draft_unresolved_and_ask_owner
      ai_reingest_check:
        - recipient_and_reason_visible
        - purpose_and_requested_work_visible
        - actual_assignee_visible
        - dependency_visible_when_present
        - approved_deadline_visible_when_present
        - completion_or_reply_evidence_visible
      redundant_processing_order_policy: omit_when_dependency_and_completion_are_already_explicit
      required_visible_structure:
        - recipient_and_reason
        - purpose_or_review_result
        - supported_review_or_technical_basis
        - requested_work
        - completion_or_reply_criteria
        - supported_follow_up
        - attachment_information
      request_work_table_fields:
        - assignee
        - requested_work
        - completion_or_reply_criteria
        - confirmation_purpose_or_request_basis_only_when_row_specific_and_readable
        - deadline_only_when_supplied
      Outlook_application_color_policy:
        authored_content_color: black
        inherit_reply_thread_color: false
        verify_paragraphs_headings_bullets_and_table_cells_before_save: true
    technical_action_brief_layout:
      use_when:
        - approved_technical_constants_or_control_conditions_present
        - ordered_implementation_or_test_sequence_present
        - explicit_result_evidence_requested
      reference: templates/technical_action_brief.example.md
      visible_order:
        - purpose_first
        - one_technical_conditions_table
        - numbered_execution_or_test_sequence
        - requested_result_evidence
        - deadline_attachment_and_followup_when_present
      does_not_create_new_mode: true
    empty_section_policy: omit
    recipient_field_policy: show_display_name_or_role_for_action_mail_never_raw_address
    reason_field_policy: merge_mail_reason_and_request_basis_when_redundant
    channel_risk_policy: synchronous_discussion_then_email_record
    channel_risk_does_not_raise_authority: true
  required_output_shapes:
    mail_draft_packet: templates/mail_draft_packet.template.yaml
    pre_send_checklist: templates/pre_send_checklist.template.yaml
    send_handoff_packet: templates/send_handoff_packet.template.yaml
    boundary_review_note: templates/boundary_review_note.template.md
  outlook_draft_application_handoff:
    authoring_workflow_may_emit_render_plan: true
    authoring_workflow_may_mutate_outlook: false
    separate_executor_required: true
    separate_executor_owner_approval_required: true
    external_send_remains_forbidden_to_authoring_workflow: true
    exact_signature_footer_payload_stays_runtime_private: true
    executor_selection_policy:
      explicit_terminal_or_programmatic_request: local_programmatic_draft_executor
      explicit_ui_or_computer_control_request: app_control_draft_executor
      unspecified_local_Outlook_draft_request_with_classic_COM_available: local_programmatic_draft_executor
      unspecified_local_Outlook_draft_request_without_classic_COM: stop_with_copy_ready_draft
      unspecified_request_default_probe_method: Marshal_GetActiveObject_for_already_running_classic_Outlook_only
      unspecified_request_probe_may_instantiate_COM_or_start_process: false
      terminal_request_forbids_ui_or_computer_control_fallback: true
      implicit_control_surface_substitution: forbidden
      implicit_cross_surface_fallback: forbidden
    bound_continuation_fast_path:
      scope: one_bounded_current_mail_task_only
      carry_forward:
        - validated_subject
        - validated_To_Cc_Bcc_display_order
        - latest_body_corrections
        - exact_selected_attachment_path_and_visible_name
        - requested_control_surface
        - logical_Outlook_signature_name
        - exact_saved_draft_StoreID_and_EntryID
      reask_only_when:
        - required_value_missing
        - owner_changed_value
        - Outlook_state_drift_detected
        - multiple_matching_drafts_exist
        - selected_file_changed
        - trusted_lock_metadata_unavailable_after_context_boundary
      cross_mail_reuse: forbidden
    local_programmatic_draft_executor:
      mutation_scope: one_current_request_unsent_draft_only
      exact_source_recipient_subject_body_and_attachment_binding_required: true
      may_save_or_display_unsent_draft: true
      produces:
        - runtime_private_current_request_binding_lock
        - exact_saved_draft_StoreID_and_EntryID_after_first_successful_save
      subject_only_draft_identity: forbidden
      runtime_draft_identity_public_or_workmeta_logging: forbidden
      may_stage_exact_selected_attachment_under_workspaces: true
      recipient_facing_label_language_matches_approved_mail_language: true
      official_external_reference_requires_visible_anchor_and_final_href: true
      signature_html_read_decode_or_concatenation: forbidden
      signature_rtf_is_inserted_as_word_editor_body_content_not_attachment: true
      signature_InsertFile_Attachment_argument: false
      signature_inline_body_content_delta_required: true
      signature_guard_runs_before_persisting_insertion: true
      failed_signature_insertion_is_discarded_unsaved: true
      signature_contract_self_test_opens_Outlook: false
      non_ascii_post_render_correction_surface: outlook_word_editor
      footer_unicode_replacement_character_count: 0
      attachment_password_method_requires_current_owner_instruction: true
      runtime_password_value_logging_or_persistence: forbidden
      external_send: forbidden
    owner_approved_send_executor:
      eligibility: separate_current_explicit_send_or_scheduled_send_instruction
      target_scope: exact_current_request_locked_draft_only
      resolves_target_by: locked_StoreID_and_EntryID
      requires:
        - runtime_private_current_request_binding_lock
        - exact_saved_draft_StoreID_and_EntryID
        - separate_current_explicit_owner_instruction
      required_pre_send_revalidation:
        - draft_store_identity
        - recipient_values_and_display_order
        - typed_ordered_recipient_correlation_identities
        - thread_subject
        - latest_body_corrections
        - exact_attachment_list
        - footer_present_once
        - scheduled_delivery_time_when_applicable
      produces:
        - pre_send_revalidation_result
        - bounded_send_confirmation_result
      Outlook_Send_call_maximum: 1
      result_confirmation:
        surfaces:
          - Sent_Items
          - Outbox
        confirmation_window_seconds: 30
        poll_interval_seconds: 1
        runtime_private_exact_correlation_fields:
          - locked_subject
          - ordered_recipient_identities
          - attachment_name_size_and_digest
          - normalized_body_digest
          - send_started_at_utc
        recipient_identity_policy:
          direct_SMTP: normalized_lowercase_SMTP
          MAPIPDL_without_direct_SMTP: sha256_of_sorted_unique_normalized_member_SMTP_set
          preserve_top_level_recipient_order: true
          unresolved_group_member_SMTP: block_before_Send_call
          member_address_logging_or_persistence: forbidden
        zero_matches_at_bound: unknown
        multiple_matches: ambiguous
      unknown_outcome_policy: report_and_never_retry_automatically
      ambiguous_outcome_policy: report_and_never_retry_automatically
      file_only_contract_test: .registry/skills/owner_outlook_mail/codex/scripts/test_outlook_send_continuation.ps1
      synthetic_or_evaluator_send: forbidden
      bulk_mailbox_mutation: forbidden
  authority_boundary:
    default_send_authority: draft_only
    owner_approval_required_for_external_send: true
    project_keyword_authority_remains_project_local_or_owner_decision: true
    footer_template_truth_remains_outlook_or_private_local: true
    public_package_contains_no_footer_contact_payload: true
    public_package_contains_no_security_disclaimer_payload: true
    public_package_contains_no_raw_mail_payloads: true
    public_package_contains_no_runtime_absolute_paths: true
    metadata_record_is_not_mail_source_truth: true
notes:
  - This package is registered in `.workflow/index.yaml` by owner request.
  - It covers authoring, review, and handoff, not unattended mail sending.
  - Actual SMTP sending still belongs to `guild_hall/gateway/mail_send/` and requires the approval rules in `MAIL_SEND_V0.md`.
  - Project-specific keywords and exceptions should be read from private/project-local metadata or an approved active keyword index at runtime.
  - The footer body is intentionally not copied into public workflow files.
  - A private owner-approved pilot used the technical action-brief layout and received positive readability feedback; public canon keeps only the synthetic structure and no sent-mail content.
  - Pilot evidence does not grant unattended send, Outlook mutation, default-route, or production-ready authority.
