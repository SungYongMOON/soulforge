workflow_id: page_xml_normalize_spec_v0
kind: role_slots
status: active
slots:
  - slot_id: workflow_runner
    title: Workflow Runner
    summary: Resolves project-local bindings, confirms split outputs are read-only inputs, initializes sidecar output folders, and keeps runtime paths out of reusable canon.
  - slot_id: split_manifest_reconciler
    title: Split Manifest Reconciler
    summary: Checks page manifest, page order, stable page ids, optional role hints, and split readiness before sidecar generation begins.
  - slot_id: module_spec_planner
    title: Module Spec Planner
    summary: Defines deterministic sidecar naming, `page_module_spec_v0` field policy, internal registration keys, optional structural/channel/classification hint policy, local/internal-candidate handling, and review-warning policies while preserving source page identity.
  - slot_id: module_sidecar_writer
    title: Module Sidecar Writer
    summary: Writes one `page_module_spec_v0.yaml` sidecar per page, including optional review-hint fields when visible, without mutating source page XML files or confirming inferred design semantics.
  - slot_id: annotation_variant_writer
    title: Annotation Variant Writer
    summary: Optionally writes derived annotated XML review variants only when project policy enables them; variants are non-canonical and review-only.
  - slot_id: manifest_handoff_writer
    title: Manifest Handoff Writer
    summary: Writes module-spec manifest, index, provenance update, warnings, annotation variant manifest when present, and downstream handoff packets.
  - slot_id: boundary_reviewer
    title: Boundary Reviewer
    summary: Checks source immutability, sidecar-first output containment, public/private boundaries, preserved page identities, optional variant status, and readiness for downstream XML-first registration.
