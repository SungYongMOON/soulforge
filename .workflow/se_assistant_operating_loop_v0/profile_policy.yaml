notes:
  - The launcher skill must read this file at runtime and must not copy optimizer values into the skill body.
  - This policy optimizes the model-facing boundary classification, route packet, owner queue, and closeout planning part of the workflow on a public-safe synthetic fixture.
  - Real SE assistant execution still requires owner-approved project binding, project-local run evidence, approved source refs when sourcebound work is requested, and separate review evidence before stronger runtime readiness claims.
