schema_version: presentation_render_verification_v0
kind: presentation_render_verification
workflow_identity:
  id: presentation_artifact_render_v0
  revision: "{{workflow_revision}}"
  package_ref: "{{immutable_git_commit_or_package_ref}}"
request_id: "{{request_id}}"
run_id: "{{run_id}}"
executor_evidence:
  worker_ref: "{{executor_tool_and_model_ref}}"
  context_ref: "{{fresh_executor_context_ref}}"
  manifest_ref: "{{_workmeta/<project_code>/runs/<run_id>/presentation_render_manifest.yaml}}"
  self_check_ref: "{{_workmeta/<project_code>/runs/<run_id>/presentation_render_self_check.yaml}}"
independent_verifier:
  worker_ref: "{{verifier_tool_and_model_ref}}"
  context_ref: "{{fresh_verifier_context_ref}}"
  fresh_context: true
  executor_builder_source_used: false
artifact:
  ref: "{{_workspaces/<project_code>/.../<output_name>.pptx}}"
  sha256: "{{output_sha256}}"
checks:
  approval_scope_and_hashes: "{{pass|fail}}"
  executor_builder_source_isolation: "{{pass|fail}}"
  pptx_package_structure: "{{pass|fail}}"
  template_identity_and_fidelity: "{{pass|fail}}"
  approved_visible_text_and_order: "{{pass|fail}}"
  semantic_roles_and_negation: "{{pass|fail}}"
  claim_critical_values: "{{pass|fail}}"
  native_text_tables_and_charts_editable: "{{pass|fail}}"
  native_list_formatting_without_literal_bullet_injection: "{{pass|fail}}"
  approved_assets_only: "{{pass|fail}}"
  all_slide_visual_and_bounds_review: "{{pass|fail}}"
  payload_and_metadata_boundary: "{{pass|fail}}"
evidence_refs:
  render_review_asset_root_ref: "{{_workspaces/<project_code>/.../render_review/}}"
  verifier_receipt_ref: "{{_workmeta/<project_code>/runs/<run_id>/independent_verifier_receipt.yaml}}"
decision: "{{pass|revise}}"
blocker_codes:
  - "{{blocker_code_or_none}}"
storage_boundary:
  metadata_only: true
  content_snippets_copied: false
  runtime_absolute_paths_recorded: false
verified_at: "{{ISO-8601 timestamp}}"
