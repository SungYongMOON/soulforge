schema_version: presentation_render_self_check_v0
kind: presentation_render_self_check
workflow_identity:
  id: presentation_artifact_render_v0
  revision: "{{workflow_revision}}"
  package_ref: "{{immutable_git_commit_or_package_ref}}"
request_id: "{{request_id}}"
run_id: "{{run_id}}"
executor:
  worker_ref: "{{tool_and_model_ref}}"
  context_ref: "{{fresh_execution_context_ref}}"
artifact_ref: "{{_workspaces/<project_code>/.../<output_name>.pptx}}"
artifact_sha256: "{{output_sha256}}"
checks:
  pptx_package_structure_is_valid: "{{pass|fail}}"
  template_trace_is_preserved: "{{pass|fail}}"
  approved_visible_text_and_order_are_preserved: "{{pass|fail}}"
  semantic_roles_and_negation_are_visibly_preserved: "{{pass|fail}}"
  claim_critical_values_are_unchanged: "{{pass|fail}}"
  native_list_formatting_does_not_inject_literal_bullet_characters: "{{pass|fail}}"
  approved_assets_only: "{{pass|fail}}"
  required_elements_remain_editable: "{{pass|fail}}"
  rendered_layout_has_no_unintended_overlap_or_clipping: "{{pass|fail}}"
evidence_refs:
  manifest_ref: "{{_workmeta/<project_code>/runs/<run_id>/presentation_render_manifest.yaml}}"
  render_review_asset_root_ref: "{{_workspaces/<project_code>/.../render_review/}}"
state: "{{executor_complete|review_required|failed}}"
blocker_codes:
  - "{{blocker_code_or_none}}"
storage_boundary:
  metadata_only: true
  content_snippets_copied: false
  runtime_absolute_paths_recorded: false
verified_at: "{{ISO-8601 timestamp}}"
