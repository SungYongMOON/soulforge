  p00_entry_count: 0
  soulforge_entry_count: 0
  soulforge_subledger_counts:
    system: 0
    knowledge: 0
    workflow: 0
    automation: 0
    ingress: 0
    skill: 0
    ui: 0
    domain_cell: 0
  accepted_entry_count: 0
  review_needed_count: 0
  skipped_count: 0
  blocked_count: 0
next_handoff:
