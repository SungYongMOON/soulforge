workflow_id: configuration_baseline_and_change_control_v0
kind: project_binding_template
status: template
project_code: "<project_code>"
configuration_baseline_run_id: "<run_id>"
inputs:
  baseline_scope_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<baseline_scope_packet>"
      read_only: true
approved_change_control_policy:
  upstream_packets_are_read_only: true
  baseline_inventory_is_not_approval: true
  change_request_requires_closure_evidence_or_owner_decision: true
outputs:
  configuration_output_root_repo_path: "_workmeta/<project_code>/runs/<run_id>/configuration_baseline/configuration_baseline_and_change_control_v0"
public_boundary:
  commit_project_outputs_to_public_repo: false
  include_raw_project_payloads_in_workflow_package: false
  use_runtime_absolute_paths_in_workflow_package: false
