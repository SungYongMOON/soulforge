rerun_triggers:
  - Outlook reconcile output templates change
  - project mail history ledger schema changes
  - Outlook metadata allowlist changes
  - P00 inbox holding or codex-managed project scope policy changes
  - dry-run/apply authorization policy changes
  - owner follow-up or ambiguous row policy changes
  - negative fixture adds accidental ledger write, Outlook mutation, or body/attachment access temptation
  - mini profile drops dry-run, P00 exclusion, owner follow-up, or no-mutation handling in a future fixture
calibration_archive_ref: .workflow/outlook_mail_reconcile_v0/calibrations/cal_20260611_outlook_reconcile_quality_equiv_001
non_claims:
  - no_real_outlook_access_or_mutation
  - no_mail_body_html_msg_or_attachment_payload_read
  - no_project_ledger_write_executed
  - no_public_repo_project_mail_publication
  - no_production_ready_claim
  - no_default_route_claim
notes:
  - This policy optimizes the model-facing reconciliation planning and boundary review part of the workflow on a public-safe synthetic fixture.
  - Real Outlook reconciliation still requires owner-approved metadata read policy, current mailbox connector state, and private project ledger boundaries.
