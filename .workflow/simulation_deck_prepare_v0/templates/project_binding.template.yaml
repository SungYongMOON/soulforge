workflow_id: simulation_deck_prepare_v0
kind: project_binding_template
status: template
project_code: "<project_code>"
simulation_deck_prepare_run_id: "<run_id>"
inputs:
  simulation_source_packet_refs:
    - packet_repo_path: "_workmeta/<project_code>/runs/<source_run_id>/simulation_sources/simulation_source_collect_v0/simulation_source_packet.yaml"
      read_only: true
  simulator_policy_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<simulator_policy_packet>"
      read_only: true
  stimuli_or_operating_condition_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<stimuli_or_operating_conditions_packet>"
      read_only: true
  measurement_definition_refs:
    - packet_repo_path: "_workmeta/<project_code>/bindings/<measurement_definition_packet>"
      read_only: true
approved_deck_prepare_policy:
  upstream_packets_are_read_only: true
  missing_models_block_prepare: true
  missing_deck_or_topology_source_blocks_prepare: true
  missing_deck_prepare_policy_blocks_prepare: true
  missing_stimulus_blocks_prepare: true
  missing_measurement_blocks_prepare: true
  missing_operating_condition_blocks_prepare: true
  unsupported_or_unverified_simulator_compatibility_blocks_prepare: true
  unapproved_model_conversion_blocks_prepare: true
  deck_prepare_is_not_execution: true
  accepted_model_statuses:
    - official_present
    - owner_approved_local
    - tool_library_official
  simulator_compatibility_allowed_for_ready_review:
    - declared_supported
    - syntax_check_passed
  simulator_compatibility_requires_review_or_block:
    - declared_unsupported
    - likely_supported_unverified
    - requires_conversion
    - blocked_by_license
    - blocked_by_missing_dependency
    - import_failed
    - not_tested
    - not_applicable
execution_policy:
  prepare_or_stage_deck_inputs: true
  run_simulation: false
  launch_simulator: false
  verify_waveforms: false
  claim_measurement_results: false
  claim_pass_fail: false
  mutate_upstream_packets: false
outputs:
  deck_prepare_output_root_repo_path: "_workmeta/<project_code>/runs/<run_id>/simulation_deck/simulation_deck_prepare_v0"
public_boundary:
  commit_project_outputs_to_public_repo: false
  include_raw_model_or_deck_payloads_in_workflow_package: false
  include_simulator_outputs_in_workflow_package: false
  use_runtime_absolute_paths_in_workflow_package: false
