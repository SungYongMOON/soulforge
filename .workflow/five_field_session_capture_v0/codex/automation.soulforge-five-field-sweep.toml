prompt = "C:\\Soulforge 를 기준 루트로 사용한다(5필드 레저 정본: C:\\Soulforge\\_workmeta). 비밀값·메일 원문·첨부 본문은 읽지 않는다. 코드 수정, 서버 재시작, public repo push 는 하지 않는다.\n\n하루 1회 bounded 5필드 sweep 을 수행한다:\n0. 먼저 두 저장소를 최신화한다: git -C C:\\Soulforge pull --ff-only 와 git -C C:\\Soulforge\\_workmeta pull --rebase — 다른 PC 에서 작업된 커밋까지 sweep 대상에 포함시키기 위함. 충돌/비FF 면 중단·보고.\n1. node .workflow/five_field_session_capture_v0/tools/five_field_promotion_scan.mjs --report --repo-root C:\\Soulforge 를 실행해 승격 신호 리포트를 갱신한다.\n2. 갭 소급: 최근 24시간 커밋(C:\\Soulforge main 과 C:\\Soulforge\\_workmeta, git log --since=24.hours --pretty 와 --stat 요약만, 파일 본문 불필요)을 레저(five_field_log.jsonl 전 과제)의 같은 시간창 행과 대조한다. 레저에 대응 기록이 없는 작업 묶음마다 .workflow/five_field_session_capture_v0/tools/five_field_capture.mjs 로 소급 기록을 남긴다: --session-ref retro_<YYYYMMDD>_<짧은해시> --worker <커밋 표기 codex_*/claude_*, 없으면 unknown_ai> --data-label ai_backfill --request-kind <행위/출처 슬러그 추정>. judgment/output/verification 은 커밋 메시지와 diff --stat 요약에서만 도출한다(원문 미복사, input_refs 는 commit:<hash> 포인터).\n3. 드레인 지표 확인: needs_backfill 행 수, dev_worker_candidate_queue 상태 분포(proposed 적체 경고), 최근 24시간 레저 신규 행 수.\n4. _workmeta 변경분(레저·리포트)은 pull --rebase 후 작업자 표기(codex_<model>)로 commit+push 한다. 충돌 시 중단하고 보고한다.\n5. 짧은 요약 보고: 소급 N건, 승격 후보 목록, 드레인 지표 3개, blocker."
