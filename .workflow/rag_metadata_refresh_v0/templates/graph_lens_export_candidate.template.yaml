workflow_id: rag_metadata_refresh_v0
kind: graph_lens_export_candidate
schema_version: v0
status: draft
candidate_id: "<candidate_id>"
source_refs:
  rag_manifest_refresh_packet_ref: "<rag_manifest_refresh_packet_ref>"
  metadata_index_refresh_packet_ref: "<metadata_index_refresh_packet_ref>"
  retrieval_trace_evaluation_refresh_ref: "<retrieval_trace_evaluation_refresh_ref>"
nodes:
  - node_ref: "<metadata_or_source_slice_ref>"
    node_type: "<rag_manifest|source_slice|packet|owner_decision|retrieval_key>"
    label_candidate: review_required
    evidence_event_refs: []
edges:
  - edge_ref: "<edge_ref>"
    from_ref: "<from_ref>"
    to_ref: "<to_ref>"
    relation_type: "<indexes|retrieves|derived_from|needs_review|mirrors_decision>"
    strength_candidate: review_required
    evidence_event_refs: []
export_candidates:
  - jsonl
  - csv
  - graphml_candidate
rules:
  graph_lens_is_read_only_export_candidate: true
  graph_edges_are_navigation_signals: true
  ontology_acceptance_not_performed: true
  graph_store_mutation_not_performed: true
