workflow_id: author_skill_package
kind: handoff_rules
status: active
rules:
  - from_step: review_request
    to_step: draft_skill_package
    handoff:
      required_outputs:
        - skill_boundary_brief.md
      notes:
        - Carry forward only repeated reusable behavior, boundary notes, and required outputs.
  - from_step: draft_skill_package
    to_step: review_resource_bundle
    handoff:
      required_outputs:
        - skill_package_draft.md
      notes:
        - The draft should already separate `skill.yaml`, optional `codex/` bridge, and local runtime concerns.
  - from_step: review_resource_bundle
    to_step: check_boundary
    handoff:
      required_outputs:
        - skill_resource_bundle_review.md
      notes:
        - The bundle review should state which examples stay as local runtime inputs and which helper assets belong in tracked `codex/`.
  - from_step: check_boundary
    to_step: prepare_install_sync
    handoff:
      required_outputs:
        - skill_boundary_review.md
      notes:
        - If the checker localizes a mismatch to tracked canon or bridge, fix that owner first before preparing install sync.
  - from_step: prepare_install_sync
    to_step: smoke_check_package
    handoff:
      required_outputs:
        - skill_install_sync_request.md
      notes:
        - The prepared install handoff note must not add runtime truth or host-local install ownership back into the tracked skill package draft.
  - from_step: smoke_check_package
    to_step: final_release_review
    handoff:
      required_outputs:
        - skill_smoke_check.md
      notes:
        - The smoke record should capture the smallest reproducible local verification path, expected runtime inputs, and whether validation succeeded.
  - from_step: final_release_review
    to_step: complete
    handoff:
      required_outputs:
        - skill_release_review.md
      notes:
        - Completion of this workflow means the package draft passed authoring-time review, resource split review, and release-time boundary review; actual mirror sync remains a local operating step described in `.registry/docs/operations/SKILL_INSTALL_SYNC.md`.
