workflow_id: external_reasoning_workspace_v0
kind: workflow_profile_policy
status: draft
validation_level: private_pilot_executed_browser_advisory
calibration_status: none
last_calibration_id: null
calibration_mode: none
profile_binding_policy:
  controller_model: runtime_binding
  controller_reasoning_effort: runtime_binding
  controller_species: runtime_binding
  controller_class: runtime_binding
  party: runtime_binding_or_unbound
  external_chatgpt_mode_label: visible_user_authorized_runtime_selection
selection_rules:
  - Do not hard-code ChatGPT model names, internal endpoints, account ids, or subscription-specific claims into this reusable workflow package.
  - Use only a visible user-authorized Pro / Thinking-like mode label in the current browser UI.
  - Use fresh bounded prompts and DOM message-role readback before advisory handoff.
  - Require explicit action-time approval for share links, file uploads, project creation, permissions, payment settings, account settings, or destructive cleanup.
  - Require separate source or verifier workflows before treating advisory output as source truth, validation evidence, owner approval, or canon authority.
default_turn_policy:
  default_max_turns: 3
  extended_turns_allowed_when_user_authorized: true
  continue_existing_session_first: true
measurement_policy:
  quality_source: none
  telemetry_source: none
  browser_runtime_token_usage_available: false
  cost_confidence: not_measured
primary_profile: null
shadow_top_k: []
rerun_triggers:
  - prompt packet shape changes
  - DOM readback method changes
  - ChatGPT UI mode label behavior changes
  - side-effect authorization policy changes
  - first private pilot exposes a new boundary failure
  - caller handoff packet shape changes
calibration_archive_ref: null
non_claims:
  - no_profile_optimization_claim
  - no_external_chatgpt_model_stability_claim
  - no_production_ready_claim
  - no_canon_ready_claim
  - no_registration_claim
  - no_default_route_claim
  - no_default_route_safety_claim
notes:
  - Runtime browser state, account state, conversation pointers, and mode labels are not public canon.
  - Profile optimization requires public-safe synthetic or private approved evidence and a separate review before this file can move beyond draft.
  - The 2026-06-07 private pilot supports only marker-verified advisory execution, not production readiness or default-route safety.
