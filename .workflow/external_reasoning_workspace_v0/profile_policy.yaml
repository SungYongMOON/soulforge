  - no_real_browser_action_executed
  - no_real_chatgpt_prompt_submitted
  - no_cookie_token_password_session_or_storage_inspection
  - no_file_upload_share_link_permission_payment_or_destructive_action
  - no_raw_url_account_id_conversation_id_or_transcript_stored
  - no_production_ready_claim
  - no_default_route_claim
  - no_default_route_safety_claim
notes:
  - Runtime browser state, account state, conversation pointers, and mode labels are not public canon.
  - The calibrated profile applies to the model-facing controller packet, boundary review, and handoff planning part of the workflow only.
  - The external ChatGPT mode label remains a visible user-authorized runtime selection and is not hard-coded by this policy.
  - The 2026-06-07 private pilot supports only marker-verified advisory execution, not production readiness or default-route safety.
