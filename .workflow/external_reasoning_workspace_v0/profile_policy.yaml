rerun_triggers:
  - prompt packet shape changes
  - DOM readback method changes
  - ChatGPT UI mode label behavior changes
  - side-effect authorization policy changes
  - first private pilot exposes a new boundary failure
  - caller handoff packet shape changes
  - adversarial fixture adds ambiguous source-truth phrasing
  - adversarial fixture adds partial DOM readback completion or missing output shape
  - adversarial fixture adds sanitized pointer metadata mixed with raw account identifiers
  - mini profile drops explicit advisory-only or no-real-browser boundaries in a future fixture
