party_id: pcb_revision_library_cell
kind: appserver_profile
status: active
profile:
  mode: local_tool_chain
  summary: Resolve DB Doctor uprev first, then dlib export/organization, using explicit runtime path bindings and owner-approved mutation scope for each Cadence tool stage.
  public_payload_policy: metadata_and_orchestration_only
  private_output_policy: project_local_run_truth_tool_logs_and_owner_evidence
notes:
  - Public party files must remain portable and payload-free.
  - Runtime paths, Cadence executable paths, generated scripts, copied board files, tool logs, and library outputs belong under `_workmeta/<project_code>/` or another approved private/project-local surface.
  - This profile is not unattended automation; local Cadence availability and mutation authority are run-time gates.
