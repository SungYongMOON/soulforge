party_id: knowledge_wiki_cell
kind: party_template
status: active
title: Knowledge Wiki Cell
summary: Canonical party for Karpathy-style sourcebound wiki materialization, routed through the registered composite knowledge wiki pipeline.
default_workflow_id: knowledge_wiki_pipeline_v0
workflow_chain:
  - order: 1
    workflow_id: knowledge_wiki_pipeline_v0
    role: composite_request_router_and_stage_chain_owner
    execution_contract: subagent_required
preferred_monster_types:
  - knowledge_wiki_request
  - llm_wiki_request
  - karpathy_style_wiki_request
  - sourcebound_knowledge_request
  - se_knowledge_wiki_request
member_slots: member_slots.yaml
allowed_species: allowed_species.yaml
allowed_classes: allowed_classes.yaml
allowed_workflows: allowed_workflows.yaml
appserver_profile: appserver_profile.yaml
notes:
  - Party owns the workflow chain only; each workflow owns its own internal steps and optimized execution profile.
  - Each workflow in this party chain is expected to execute through a fresh subagent stage in real runs.
  - Source truth remains in source packets or owner-held files; generated wiki material is private derivative projection until reviewed.
  - Google Drive is the central archive for source refs and working bundles; a fully qualified ontology release is the narrow package-level canon exception defined by ONTOLOGY_CANON_OPERATING_POLICY_V0.md.
  - Drive and NotebookLM placement follows `docs/architecture/guild_hall/KNOWLEDGE_WAREHOUSE_BOOKSHELF_RULES_V0.md`; Drive is the source warehouse, NotebookLM notebooks are query bookshelves, and `_workmeta` remains the source catalog.
  - Archive manifest handling belongs inside the source intake, sourcebound projection, or composite knowledge wiki pipeline stages; archive presence without a valid ontology release manifest must not be treated as canon.
  - When archive policy declares `codex_skill_auto_sync`, the party may let approved Codex skills or the Google Drive connector upload/sync bounded archive files without per-file owner confirmation.
  - Automatic archive upload/sync remains storage authority only. Bounded ontology release registration additionally requires the explicit owner policy, package guards, and review; it still cannot approve original source truth or bypass secret/private boundaries.
  - ZIP containers are not retained as source truth; extracted files and inventories are used instead.
  - NotebookLM or other advisory handoffs may assist navigation but cannot approve source truth, ontology canon, or workflow promotion.
  - Official public source families approved by owner rule may produce public-safe summaries, ontology seeds, NotebookLM packet manifests, and registry entries; NotebookLM answers remain advisory and raw/chunk payloads stay outside public canon.
  - Obsidian output is a generated read-only view over canon-backed `.registry/knowledge` entries or approved canon packages only. It must not read directly from `_workmeta` payloads, NotebookLM answers, or Drive candidate storage.
  - The default party entry is now `.workflow/knowledge_wiki_pipeline_v0/`, which internally routes through the registered source intake, sourcebound packet, knowledge access, and review stages.
  - When sourcebound/wiki metadata changes affect RAG discoverability, the party may prepare an optional metadata-only handoff to `rag_metadata_refresh_v0`; RAG artifact refresh, metadata index generation, and answer smoke checks remain owned by that downstream workflow.
  - A RAG refresh handoff from this party never grants source-text retrieval, BM25/vector source-index build, NotebookLM packet membership, public canon promotion, ontology acceptance, owner approval, or default-route authority.
  - The party's optional route set also includes the registered LLM wiki stack (`llm_wiki_builder_v0`, `monster_knowledge_preflight_v0`, `knowledge_candidate_triage_v0`, and `wiki_curation_maintenance_v0`) for bounded knowledge-heavy work when the user explicitly needs query-first wiki operation rather than only fresh sourcebound projection.
  - The registered optional RAG source-text support routes (`rag_source_text_quality_review_v0` and `rag_work_card_router_v0`) may be selected after source-text lane artifacts exist, but they remain support/trace/work-card routes and do not grant source truth, answer authority, project execution authority, default-route safety, or public canon promotion.
