party_id: systems_engineering_cell
kind: party_template
status: active
title: Systems Engineering Cell
summary: Reusable workflow-chain party for routing systems-engineering assistant requests across scaffold, stage-gap, source, readiness, owner-decision, and closeout workflows without granting design authority.
service_lane:
  primary: systems_engineering
  primary_name_ko: systems_engineering
  secondary:
    - project_management
    - knowledge_work
    - review
  secondary_name_ko:
    - project_management
    - knowledge_work
    - review
  purpose: execution_fit
  authority: routing_hint_only
default_workflow_id: se_assistant_operating_loop_v0
workflow_chain:
  - order: 1
    workflow_id: se_assistant_operating_loop_v0
    role: request_router_and_stage_chain_owner
    execution_contract: subagent_preferred
  - order: 2
    workflow_id: se_stage_artifact_gap_scan_v0
    role: stage_gap_scan_when_needed
    execution_contract: subagent_preferred
  - order: 3
    workflow_id: se_knowledge_wiki_pipeline_v0
    role: source_or_knowledge_pipeline_when_needed
    execution_contract: subagent_required_for_sourcebound_work
  - order: 4
    workflow_id: project_readiness_digest_v0
    role: owner_readable_status_when_needed
    execution_contract: subagent_optional
  - order: 5
    workflow_id: post_development_review_gate_v0
    role: closeout_review_when_state_or_claim_changes
    execution_contract: subagent_preferred
preferred_monster_types:
  - se_assistant_request
  - systems_engineering_project_start
  - se_stage_gap_scan_request
  - se_source_gap_request
  - se_review_readiness_request
  - se_owner_decision_request
reference_lookup_route_candidates:
  - candidate_id: se_authority_example_bridge_agentic_lookup_v0
    status: pilot_executed_private_candidate
    posture: route_hint_only
    use_when:
      - An SE request needs an official source basis before drafting or gap analysis.
      - An artifact question needs observed field or form-shape examples without treating examples as authority.
      - The request touches requirements traceability, quality gate forms, BOM or configuration, interface, test, review, or acceptance evidence.
    route_order:
      - Check whether an official source pack is available for the requested artifact family.
      - Check the registered reference example lookup candidate for observed form and field-shape hints.
      - If the request asks whether a source, form, result, review, or closure state is official/current/accepted, route to current-source acquisition or claim-specific evidence review before answering as authority.
      - Route missing official authority, source scope, or owner approval to the proper source-gap, sufficiency-review, or owner-decision workflow.
    allowed_downstream_workflows:
      - se_knowledge_wiki_pipeline_v0
      - source_gap_followup_packet_v0
      - source_packet_sufficiency_review_v0
      - page_module_trace_matrix_v0
      - se_cross_stage_mapping_governance_v0
      - owner_decision_packet_v0
    next_pilot_candidates:
      - current_source_authority_acquisition_queue
      - claim_specific_review_verification_evidence_refresh
      - owner_decision_sparse_lane_classification
    non_claims:
      - Not public canon.
      - Not production-ready.
      - Not official artifact authority.
      - Does not make any reference example project authoritative.
      - Does not turn trace governance rows into final requirements truth or verification completion.
      - Does not turn cross-stage governance rows into source truth, readiness approval, or artifact authority.
member_slots: member_slots.yaml
allowed_species: allowed_species.yaml
allowed_classes: allowed_classes.yaml
allowed_workflows: allowed_workflows.yaml
appserver_profile: appserver_profile.yaml
notes:
  - Party owns the reusable workflow-chain loadout only.
  - Workflow-local profile policies own model, reasoning effort, species, class, and unit/profile recommendations.
  - Design authority, source truth, review approval, verification acceptance, and public/private promotion stay with the owning workflow, mission, source packet, review gate, or owner decision.
  - The default workflow is an assistant operating loop, not unattended automation and not a default route switch for every project.
  - Reference lookup candidates are party-level route hints only; private evidence, raw source payloads, and project-local run truth stay outside party canon.
