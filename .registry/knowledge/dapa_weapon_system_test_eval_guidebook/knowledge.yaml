claim_scope:
  supported:
    - Test and evaluation is treated as part of the systems engineering process for system development and acquisition.
    - Test and evaluation supports acquisition decision making by providing data for performance confirmation, trade-off analysis, risk reduction, and requirement review.
    - Development test evaluation and operational test evaluation are distinct but related evidence lanes for technical performance and operational suitability.
    - Verification checks whether requirements, design, physical architecture, and related specifications are satisfied.
    - Reliability testing is a reusable sublane of weapon-system test and evaluation planning and assessment.
