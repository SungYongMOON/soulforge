claim_scope:
  supported:
    - Towed-body stability should be separated into external body dynamics and sensor or payload quieting when the sensor reference frame has its own mechanical support or isolation path.
    - Tow point, CG, CB, tow speed, hydrodynamic force, added mass, damping, and hydrostatic restoring terms are separate source-packet fields rather than one interchangeable stability number.
    - A sensor point's acceleration depends on its offset from the apparent rotation or quiet point; measured motion is still required to locate that point in a real body.
    - Internal liquid, annular or ring baffles, compartmentation, restricted passages, slots, squeeze films, and perforations can alter liquid natural frequency, damping, pressure loss, or added inertia, with geometry, fill state, and frequency dependence.
    - Cable strumming and towed-array vibration are recognized noise and load mechanisms, so sensor isolation and quieting can be mission-relevant.
    - Underwater-vehicle and towfish force/moment results should be requested with reference point, coordinate convention, coefficient basis, uncertainty, and time or phase information.
    - Pointing, boresight, timebase, latency, and calibration errors should be budgeted explicitly when mechanical attitude error affects sensor performance.
  excluded:
    - SONAR2093 design intent or source-truth confirmation
    - P26-014 requirement, CDR acceptance, customer approval, or design approval
    - numerical validity of any private stiffness, damping, inertia, CG, CB, pivot, roll, pitch, or pointing value
    - claiming mushroom, jellyfish, cap, or gap geometry is beneficial without actual geometry, fill state, damping, and response evidence
    - vendor or solver capability proof from tool names alone
    - NotebookLM answer authority, raw source text copying, private project payloads, or vendor-origin source truth
