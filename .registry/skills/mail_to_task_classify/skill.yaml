skill_id: mail_to_task_classify
kind: skill
status: active
title: Mail To Task Classify
summary: Run the dev-erp deterministic mail→할일 pipeline with LLM judgment — detect unconverted mail, classify which mails are real tasks and fill fields, then apply via the deterministic ledger engine so new tasks land in the ERP.
behavior:
  intent: >
    Close the mail→task intake gap in dev-erp. The deterministic engine
    (`tools/mail_to_task_ledger.mjs`) already converts a candidates JSON into
    할일_장부 rows, and `tools/mail_to_task_pending.mjs` deterministically lists
    mail not yet converted. The missing piece is the LLM judgment: deciding
    which pending mail is a real task and filling work_type/completion_criteria/
    title/due/route per the classification contract. This skill packages that
    judgment as a repeatable, incremental run that Codex (or any LLM agent) can
    schedule, without moving the deterministic engine or classification truth
    into a place the core cannot maintain.
  use_when:
    - the user asks why mail is not turning into tasks, or to make mail→할일 automatic
    - the user asks to classify or triage project mail into the task ledger
    - a scheduled or on-demand mail→task intake run is needed for dev-erp
    - new mail history exists and the team needs the action items pulled out as tasks
  avoid_when:
    - the request needs raw mail body, HTML, .msg, attachment, or secret reads (metadata-only here)
    - the request is to fetch mail from the server (that is the upstream fetch stage, not this skill)
    - the request is to hard-assign owners team-wide before rbac_permission boundaries are set
    - no _workmeta mail history exists yet for any project (nothing to convert)
  expected_outcome:
    - pending (unconverted) mail is listed deterministically per project
    - only action-required mail becomes candidates; pure FYI/newsletter is omitted; uncertain mail becomes a conservative review task
    - the engine writes 할일_장부 rows; with --auto-open + SE단계 the real tasks land as open
    - autosync (or task_ledger import) surfaces the new tasks in the ERP
    - converted mail is excluded from the next pending scan (idempotent); non-task mail re-surfaces (V1 limitation, documented)
    - no mail body/attachment/secret is read; no mail rows go into public tracked files
execution_requirements:
  required_capabilities:
    - project_mail_history_ledger_context
    - mail_to_task_classification
    - csv_metadata_review
    - dev_erp_tool_invocation
  preferred_capabilities:
    - se_stage_context
    - assignee_routing_judgment
    - boundary_review
  preferred_tools:
    - node
    - rg
    - sqlite_read
  notes:
    - "The deterministic engines (mail_to_task_pending.mjs, mail_to_task_ledger.mjs) own the data shape; this skill must not reimplement CSV/ledger logic."
    - "The classification contract lives in codex/references/rubric.md; keep judgment rules there, not duplicated as binding authority elsewhere."
    - "Metadata-only: subject/from/mailbox/source_id/due_hint. Never request mail body, attachments, or secrets."
notes:
  - "`mail_to_task_classify` is a self-contained dev-erp intake skill, not a workflow launcher."
  - "Skill activation does not grant mail-fetch authority, team-wide hard-assignment, or public commit of mail rows."
