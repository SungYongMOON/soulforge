skill_id: knowledge_audit
kind: skill
status: active
title: Knowledge Audit
summary: Run the registered knowledge source audit workflow from Codex and summarize the generated private metadata-only reports without moving, copying, uploading, deleting, or decoding source payloads.
behavior:
  intent: >
    Provide a thin Codex launcher for `.workflow/knowledge_source_audit_v0`.
    The launcher resolves the workflow package, reads workflow-owned profile
    policy at execution time, runs the existing deterministic RAG audit CLI when
    requested, validates the private report, and summarizes owner next actions.
    It is an invocation bridge only; the workflow owns steps, profile policy,
    output contracts, and review posture.
  use_when:
    - the user asks for a knowledge audit
    - the user asks to audit knowledge source storage, source originals, or source pointers
    - the user asks whether knowledge files are actually under _workspaces or only externally pointed
    - the user asks Korean phrases such as "지식 감사", "지식 원본 감사", "원본 전수조사", or "지식 전수조사"
    - the user wants the next owner actions after running the storage audit
  avoid_when:
    - the user asks to copy, move, delete, link, or upload source files without a separate owner decision
    - the request requires reading raw source text, source payload bodies, secrets, credentials, cookies, tokens, or sessions
    - the request requires NotebookLM upload/query, Google Drive mutation, public canon promotion, source truth approval, ontology acceptance, or default-route switching
    - the request is only about authoring or changing the workflow package itself
  expected_outcome:
    - Codex reads `.workflow/knowledge_source_audit_v0/workflow.yaml`
    - Codex reads `step_graph.yaml` and `profile_policy.yaml` before execution planning
    - Codex runs or references `knowledge-source-storage-audit` through `guild_hall/rag/cli.mjs`
    - Codex validates any generated audit JSON before interpreting the report
    - Codex reports the private summary, owner decision queue, and next actions without granting storage mutation authority
execution_requirements:
  required_capabilities:
    - workflow_profile_policy_resolution
    - metadata_only_storage_audit
    - private_report_summary
    - owner_decision_queue_awareness
    - post_development_review_awareness
  preferred_capabilities:
    - yaml_review
    - csv_summary
    - boundary_check
  preferred_tools:
    - rg
    - node
    - npm.cmd
    - soulforge_validators
  notes:
    - "The launcher must resolve workflow-owned `profile_policy.yaml` at execution time; do not copy optimizer or runtime profile choices into this skill as authority."
    - "Reports are private metadata-only artifacts under `_workmeta`; public skill canon must not contain runtime absolute paths, source payloads, secrets, or private report bodies."
    - "Owner decision queues are advisory until the owner approves copy/link/move/delete/upload or source-of-record actions."
notes:
  - "`knowledge_audit` is a thin Codex bridge for the registered `knowledge_source_audit_v0` workflow."
  - "The installed Codex mirror name is normally `soulforge-knowledge-audit` after `npm.cmd run skills:sync -- knowledge_audit`."
