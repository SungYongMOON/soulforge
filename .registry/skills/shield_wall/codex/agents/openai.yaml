interface:
  display_name: "Shield Wall"
  short_description: "Bound one unresolved risk before action"
  default_prompt: "Use $soulforge-shield-wall only when one unresolved boundary blocks safe action; inspect the minimum evidence needed and stop when the boundary or blocker is explicit."

dependencies:
  tools:
    - type: "mcp"
      value: "pdf"
      description: "Preferred PDF inspection capability when evidence arrives as a PDF document."

policy:
  allow_implicit_invocation: true
