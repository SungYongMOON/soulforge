skill_id: workflow_optimizer
kind: skill
status: active
title: Workflow Optimizer
summary: Validate model-family migrations against an incumbent or search Soulforge workflow execution profiles, then record only runner-verified policy evidence.
behavior:
  intent: First decide whether dedicated LLM optimization is applicable, then retain or replace an incumbent through runner-verified migration validation or expand to staged profile search only when required, while keeping golden outputs, candidate runs, quality evidence, telemetry proxies, and billing claims separated.
  use_when:
    - a `.workflow/<workflow_id>/` execution profile must be calibrated or re-calibrated
    - model availability, pricing, or family changes require incumbent-controlled migration validation
    - model, reasoning effort, species, and class candidates need a broader staged comparison
    - workflow-level profile policy and calibration archive need to be updated
  avoid_when:
    - the task uses raw private input, secrets, customer material, or `_workspaces` runtime truth that cannot be redacted
    - the user only needs a one-off answer rather than reusable workflow profile policy
    - the workflow canon entry does not exist yet
    - the workflow is inactive or deterministic/script-backed and model choice does not materially affect its authoritative outcome
  expected_outcome:
    - an applicability decision records dedicated optimization, compatibility smoke only, or deferred/no-optimization state
    - public-safe calibration evidence is archived under `.workflow/<workflow_id>/calibrations/<calibration_id>/`
    - "`.workflow/<workflow_id>/profile_policy.yaml` records whether migration retained or replaced the incumbent plus tested and untested scope"
    - quality, runner capability, token proxy, pricing, and billing sources are reported separately
execution_requirements:
  required_capabilities:
    - workflow_profile_calibration
    - isolated_candidate_generation
    - quality_gate_evaluation
    - boundary_review
  preferred_capabilities:
    - codex_app_goal_management
    - subagent_orchestration
    - cli_telemetry_parsing
    - yaml_and_jsonl_archive_authoring
  preferred_tools:
    - get_goal
    - create_goal
    - update_goal
    - spawn_agent
    - codex exec --json --ephemeral
    - rg
  notes:
    - "Model availability or pricing changes default to `migration_validation`; do not start a Cartesian profile search unless an expansion trigger applies."
    - "Candidate eligibility requires a launchable executable runner and runner-supported effort resolution for each model; cache or catalog visibility alone is insufficient."
    - "If runner/catalog compatibility is blocked, retain the incumbent and do not claim a new-model winner."
    - "Expanded staged search requires a first calibration, material workflow-contract change, no passing migration candidate, unstable close results, or a user request; exhaustive Cartesian search requires explicit authorization."
    - "Treat every effort advertised by the executable runner, including `max` or `ultra`, as a model-specific `reasoning_effort`; use higher efforts only for evidence-backed quality escalation. Configure delegation topology as a separate dimension and test it only when explicitly authorized."
    - "Golden output and evaluator criteria stay evaluator-only and must not be included in candidate prompts."
    - "Actual runner path/version, model and effort support, pricing service, billing source, subagent limits, and raw run truth remain runtime concerns."
notes:
  - "`workflow_optimizer` is the canonical Soulforge skill package for workflow profile calibration."
  - "The Codex bridge is tracked under `codex/` and syncs to a local installed mirror through `npm run skills:sync -- workflow_optimizer`."
  - "The Codex bridge keeps detailed matrix, telemetry, archive, and policy guidance in `codex/references/` for progressive disclosure."
