skill_id: knowledge_wiki_cell_launcher
kind: skill
status: active
title: Knowledge Wiki Cell Launcher
summary: Route sourcebound knowledge wiki requests through the existing Knowledge Wiki Cell party without moving party, workflow, profile policy, source truth, or runtime bindings into the skill.
behavior:
  intent: >
    Provide a thin Codex launcher for `.party/knowledge_wiki_cell`. The launcher
    helps a future Codex run resolve the registered party, composite workflow,
    downstream workflow set, and workflow-owned profile policies at execution
    time. It is an invocation bridge only; the party remains the reusable
    orchestration template and each workflow remains the owner of its own steps,
    profile policy, review posture, and output contracts.
  use_when:
    - the user asks to run or route `knowledge_wiki_cell`
    - the user asks for a Soulforge knowledge wiki, LLM wiki, sourcebound wiki, or Karpathy-style wiki materialization route
    - the user asks Korean phrases such as "지식 위키", "위키화", "LLM 위키", "소스바운드 지식 패킷", or "NotebookLM 책장"
    - a knowledge wiki request should use the existing party chain instead of re-expanding workflow selection from scratch
    - wiki/sourcebound metadata changes may need a metadata-only RAG refresh handoff
    - approved RAG source-text refs need page-level quality review or deterministic work-card routing through registered optional workflows
  avoid_when:
    - the user asks to create or change the `knowledge_wiki_cell` party itself
    - the request requires approving source truth, ontology canon, public promotion, archive/retire decisions, or default-route switching
    - the request requires source-text retrieval, BM25/vector source-index building, NotebookLM packet mutation, RAG answer authority, source truth approval, or project execution authority
    - the request would copy raw source payloads, NotebookLM answers, Drive payloads, private run truth, runtime absolute paths, or secrets into public skill canon
    - the request needs owner archive/upload authority that is not already declared by a workflow or owner-held archive policy
  expected_outcome:
    - Codex reads `.party/knowledge_wiki_cell/party.yaml` and `allowed_workflows.yaml`
    - Codex resolves the required and optional workflow set from the party and `.workflow/index.yaml`
    - Codex reads each selected workflow's `workflow.yaml` and `profile_policy.yaml` before planning execution
    - model, reasoning effort, species, and class are inherited as workflow-owned hints rather than copied as launcher authority
    - source truth, generated wiki projections, knowledge access metadata, and review packets stay in their proper owner surfaces
    - optional RAG refresh routing stays a metadata-only handoff to `rag_metadata_refresh_v0`
    - optional RAG quality/work-card routing stays below source truth, answer authority, public canon promotion, and default-route safety
execution_requirements:
  required_capabilities:
    - party_launcher_routing
    - workflow_profile_policy_resolution
    - sourcebound_knowledge_boundary_review
    - post_development_review_awareness
    - rag_metadata_refresh_handoff_awareness
    - rag_source_text_quality_review_route_awareness
    - rag_work_card_route_awareness
  preferred_capabilities:
    - yaml_review
    - knowledge_wiki_request_triage
    - private_evidence_boundary_check
  preferred_tools:
    - rg
    - yaml_reader
    - markdown_editor
    - soulforge_validators
  notes:
    - "The launcher must resolve party and workflow-owned profile policies at execution time; do not copy optimizer profile values into `codex/SKILL.md` as binding authority."
    - "Drive, NotebookLM, and Obsidian are execution or viewing surfaces only; none of them become source truth or promotion authority through this skill."
    - "RAG metadata refresh is a downstream workflow route, not launcher authority; the launcher may prepare a metadata-only handoff but must not run source-text indexing or answer-engine steps."
    - "RAG quality review and work-card routing are registered optional support routes; they do not grant source truth, answer authority, project execution authority, public canon promotion, or default-route safety."
    - "Actual local install paths, connector availability, archive policy bindings, and project payloads remain runtime concerns outside public skill canon."
notes:
  - "`knowledge_wiki_cell_launcher` is a thin Codex bridge for the registered `.party/knowledge_wiki_cell` loadout."
  - "The installed Codex mirror name is normally `soulforge-knowledge-wiki-cell-launcher` after `npm run skills:sync -- knowledge_wiki_cell_launcher`."
