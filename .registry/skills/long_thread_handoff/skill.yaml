skill_id: long_thread_handoff
kind: skill
status: active
title: Long Thread Handoff
summary: Replace the repeated long-thread manager prompt with an explicit Codex launcher for contamination-free Soulforge handoff through fresh subagents.
behavior:
  intent: >
    Provide a Codex-facing bridge for long Soulforge thread closeout and continuation.
    The skill compresses the user's repeated prompt into an explicit invocation that
    declares the goal, decides whether a compact handoff checkpoint is needed, writes or refreshes it only when unresolved forward-state must cross a context boundary, delegates
    material work and review to fresh subagents by default when available, and keeps Telegram
    completion notification behind safe delivery and authorization boundaries.
  use_when:
    - the user explicitly asks for Soulforge long-thread handoff mode
    - the user writes "장기작업 인계 시작", "오염방지 인계모드", "긴 스레드 인계", or equivalent wording
    - the user wants to avoid re-pasting the long manager/subagent/workflow-check/Telegram prompt near the end of a long thread
  avoid_when:
    - the task is a normal short request that does not need context rotation or handoff
    - the user wants all current context forked into subagents rather than a compact handoff
    - Telegram delivery would require reading or exposing credentials, tokens, sessions, or secret files
  expected_outcome:
    - unresolved forward-state is summarized into a compact `NIGHT_WORK_HANDOFF`-style checkpoint only when it must survive a context boundary
    - clean bounded work closed by commit, push, self-verification, and no extra forward-state records an explicit no-handoff reason instead of creating a checkpoint
    - checkpoint refresh, compact, and fresh-session decisions preserve only durable state needed for the next phase
    - explicit invocation actively uses fresh subagents for non-trivial bounded work, unless a named no-subagent exception is recorded
    - fresh subagents receive only the required checkpoint or explicit no-handoff reason, target files, boundaries, and acceptance criteria
    - fresh subagents receive a bounded delegation packet with objective, context refs, acceptance criteria, read/write scope, side-effect limits, validators, result packet shape, execution-contract claim ceiling, and stop conditions
    - workflow creation or material evolution is routed through `soulforge-workflow-generator`
    - workflow review is routed through `soulforge-workflow-check`
    - completion reports name subagent roles, validation status, Telegram sent/not-sent status, and remaining blockers
execution_requirements:
  required_capabilities:
    - goal_declaration
    - compact_handoff_authoring
    - autonomous_context_reset_decision
    - subagent_orchestration
    - boundary_review
  preferred_capabilities:
    - gpt_5_6_xhigh_subagents
    - workflow_generator_bridge
    - workflow_check_bridge
    - telegram_safe_handoff
  preferred_tools:
    - spawn_agent
    - wait_agent
    - git_status
    - yaml_validator
  notes:
    - "Actual model, subagent availability, Telegram delivery, and installed Codex skill paths resolve in the local runtime."
    - "The installed mirror name after sync is normally `soulforge-long-thread-handoff`."
notes:
  - "`long_thread_handoff` is an explicit opt-in launcher, not an implicit default for all Soulforge work."
  - "Runtime transcripts, private payloads, Telegram credentials, and raw project truth stay outside the tracked skill package."
