skill_id: long_thread_handoff
kind: skill
status: active
title: Long Thread Handoff
summary: Replace the repeated long-thread manager prompt with an explicit Codex launcher for contamination-free Soulforge handoff through fresh subagents.
behavior:
  intent: >
    Provide an explicit Codex-facing bridge for long Soulforge phase transitions and continuation.
    The skill compresses the user's repeated prompt into an explicit invocation that
    declares the goal, decides whether a compact handoff checkpoint is needed, writes or refreshes it only when unresolved forward-state must cross a context boundary, delegates
    only the analysis, implementation, and verification roles needed for substantive work to fresh
    subagents in dependency order, and keeps the manager/controller as integration owner.
  use_when:
    - the user explicitly asks for Soulforge long-thread handoff mode
    - the user writes "장기작업 인계 시작", "오염방지 인계모드", "긴 스레드 인계", or equivalent wording
    - the user wants to avoid re-pasting the long manager/subagent/workflow-check prompt near the end of a long thread
  avoid_when:
    - the task is a normal short request that does not need context rotation or handoff
    - the user wants all current context forked into subagents rather than a compact handoff
    - the request is a normal continuation within the same phase and does not need fresh-worker isolation
  expected_outcome:
    - unresolved forward-state is summarized into a compact `NIGHT_WORK_HANDOFF`-style checkpoint only when it must survive a context boundary and an owner-approved exact path or reference is confirmed
    - clean bounded work closed by commit, push, self-verification, and no extra forward-state records an explicit no-handoff reason instead of creating a checkpoint
    - checkpoint refresh, compact, and fresh-session decisions preserve only durable state needed for the next phase
    - explicit invocation actively uses fresh subagents for non-trivial bounded work, unless a named no-subagent exception is recorded
    - analysis, implementation, and verification lanes are created only when their roles are needed and run in dependency order, with verification after stable implementation
    - HEAD, index lock, dirty-change ownership, external editing, and write-surface overlap are checked before writer delegation
    - each file, database schema, or other writer surface has one active writer; overlap is sequentialized or isolated in a separate worktree
    - fresh subagents receive only the required checkpoint or explicit no-handoff reason, target files, boundaries, and acceptance criteria
    - fresh subagents receive a bounded delegation packet with objective, context refs, acceptance criteria, read/write scope, side-effect limits, validators, result packet shape, execution-contract claim ceiling, and stop conditions
    - workflow creation or material evolution is routed through `soulforge-workflow-generator`
    - workflow review is routed through `soulforge-workflow-check`
    - completion reports name subagent roles, exposed profile facts or `unselectable`/`unknown`, validation status, applicable Telegram status, and remaining blockers
execution_requirements:
  required_capabilities:
    - goal_declaration
    - compact_handoff_authoring
    - autonomous_context_reset_decision
    - subagent_orchestration
    - boundary_review
  preferred_capabilities:
    - fresh_context_subagents
    - workflow_generator_bridge
    - workflow_check_bridge
    - conditional_telegram_safe_handoff
  preferred_tools:
    - spawn_agent
    - wait_agent
    - git_status
    - yaml_validator
  notes:
    - "Use `fork_turns=\"none\"` for fresh workers in the current Codex collaboration runtime; other runtimes should use their equivalent fresh-context control."
    - "Request a user-specified strongest model/reasoning profile only when selectors are exposed; do not invent a profile requirement when the user did not specify one. Otherwise use the strongest available fresh worker and report the profile as `unselectable` or `unknown`."
    - "Actual subagent availability, Telegram delivery, and installed Codex skill paths resolve in the local runtime."
    - "The installed mirror name after sync is normally `soulforge-long-thread-handoff`."
notes:
  - "`long_thread_handoff` is an explicit opt-in launcher, not an implicit default for all Soulforge work."
  - "Do not create or refresh `NIGHT_WORK_HANDOFF` without an applicable owner-approved exact path or reference."
  - "Consider Telegram only when the current request or an applicable standing authorization calls for it, and confirm authorization and mechanism at send time."
  - "Runtime transcripts, private payloads, Telegram credentials, and raw project truth stay outside the tracked skill package."
