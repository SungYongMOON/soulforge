skill_id: report_writer
kind: skill
status: candidate
title: Report Writer (launcher for report_authoring_v0)
summary: Thin Codex launcher for the fixed `.workflow/report_authoring_v0` binding. It selects `full_authoring` or draft-only `final_polish`, completes only the pre-request material-gap intake, coordinates fresh executor and independent verifier outputs, and invokes the fixed runner. All editorial behavior remains workflow-owned.
behavior:
  intent: >
    Map `$soulforge-report-writer`, `/report-writer`, and related user language to
    the exact `report_authoring_v0` workflow. Prepare its bounded request, obtain
    fresh author/executor outputs, obtain a separate fresh semantic-verifier result,
    and call the fixed finalize CLI. The workflow owns adaptive structure, editorial
    policy, preservation, rendering, and receipt behavior. The Node runner does not
    call a model. Fact, number, citation, cause, role, and verdict authority remain
    owner/source.
  use_when:
    - 팀원이 측정 자료/그래프/초안만 들고 왔고 보고에 결론이 없을 때
    - 보고/발표가 "측정 자료만 모았고 결론이 없다"는 지적을 받을 때
    - "이 실험을 왜 했나", "그래서 어떻게 하겠다는 건가"에 답이 없을 때
    - 실험/시험/분석/진도 결과를 보고서나 발표자료로 정리해야 할 때
    - 기존 초안을 실제 업무 보고서 구조와 자연스러운 실무자 문체로 최종 정리할 때
    - the user asks for `/report-writer` or report drafting in the owner's practitioner register
  avoid_when:
    - 사실, 수치, 시험결과 자체를 만들어내야 할 때 (owner/source authority)
    - 법정 별지 서식, 고객 지정 양식이 이미 강제될 때 — 그 양식을 우선하고 본 골격은 내용 점검용으로만 쓴다
    - 보고가 아닌 단순 텍스트 메모, 일반 문서
  expected_outcome:
    - Codex resolves the invocation to `report_authoring_v0`
    - `full_authoring` asks one material-gap question at a time before request preparation
    - `final_polish` accepts one draft without requiring optional source or manifest inputs
    - fresh executor and independently identified verifier outputs are validated before fixed finalization
    - reader deliverables and audit artifact refs remain separate
    - report bodies remain in `_workspaces` or an approved worksite while `_workmeta` receives metadata-only receipts
execution_requirements:
  required_capabilities:
    - workflow_launcher_routing
    - fixed_runner_request_preparation
    - fresh_executor_coordination
    - independent_verifier_coordination
    - receipt_confirmed_finalization
  preferred_capabilities:
    - opaque_ref_and_hash_binding
    - public_private_boundary_review
  preferred_tools:
    - rg
    - markdown_editor
  notes:
    - "The workflow package owns the procedure; this launcher must not copy its editorial contract or renderer."
    - "ERP calls the workflow/runner directly, not the skill."
    - "Default routing, approval, publish, send, and project-share writeback remain disabled."
notes:
  - "`report_writer` is a thin Codex bridge for `.workflow/report_authoring_v0`."
  - "The installed Codex mirror name is expected to be `soulforge-report-writer` after skill sync."
  - "candidate launcher; fixed runtime callable acceptance and promotion gates remain open, and the route is neither production-ready nor default-routed."
