interface:
  display_name: "Soulforge Owner Outlook Mail"
  short_description: "Bound Outlook drafts, attachments, signatures, and sends."
  default_prompt: "Use $soulforge-owner-outlook-mail to draft and apply a structured owner-style Outlook email, preserve current-request bindings across follow-ups, insert the registered signature in the body rather than as an attachment, and send only after a separate current explicit instruction for the exact validated draft."

policy:
  allow_implicit_invocation: true
