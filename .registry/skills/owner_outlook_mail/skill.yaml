skill_id: owner_outlook_mail
kind: skill
status: active
title: Owner Outlook Mail
summary: Select the outbound mail authoring workflow for correction-locked Outlook drafts, exact attachments, safe inline signatures, and a separately authorized one-send continuation while preserving current-request bindings.
behavior:
  intent: >
    Provide a thin Codex launcher for owner-style Outlook mail authoring through
    `.workflow/outbound_mail_authoring_v0`. The workflow remains procedure
    authority. The launcher selects Outlook manual or draft-only scope, honors
    an explicit terminal/programmatic versus UI control-surface request, defaults
    an unspecified local Outlook draft request to the safe local programmatic
    executor when it is available, preserves trusted bindings across the same
    bounded mail task, loads
    the public v1 per-assignee team context template, and may bind a local/private aggregate
    voice profile without copying private evidence into public canon.
  use_when:
    - the user explicitly asks for owner-style Outlook mail
    - the user invokes `$soulforge-owner-outlook-mail`
    - a team mail brief should be normalized before an Outlook manual draft
    - the user explicitly asks to create an unsent local Outlook draft through a terminal or programmatic control surface
    - the user asks to attach an exact selected file or insert the registered Outlook signature in the current draft
    - the owner separately instructs Codex to send the exact validated current-request draft
    - the user expects visible 수신/사유, numbered purpose/status and basis sections, a request table, completion/reply criteria, or black Outlook formatting
  avoid_when:
    - the task requires Outlook send without a separate current explicit owner instruction for one exact locked draft
    - the task requires Outlook move, delete, mark, category, folder, rule, bulk, or unattended mutation
    - the task requires raw mail body, raw HTML, `.msg`, `.eml`, attachment payload, secret, or credential access outside an exact current-request local draft application
    - the task is sent or received mail reconciliation
  expected_outcome:
    - Codex resolves to `outbound_mail_authoring_v0`
    - requested send surface remains `outlook_manual`
    - authority state remains `draft_only` until owner approval
    - structured context uses the workflow-owned public template
    - supported v0 context normalizes to v1-only without inferred assignees or lost ambiguous values
    - multi-assignee work, notes, schedule, formats/examples, attachments, and response requirements survive into draft review
    - the visible body uses compact, action, decision, status-change, or reply-map rendering without empty headings
    - compact is limited to pure sharing with no requested work, confirmation, review, decision, or response
    - any requested work or required response produces a structured action or decision brief even when only one assignee or one work item exists
    - actionable request mail shows approved recipient display and reason at the top, applies latest owner corrections last, and rejects superseded wording
    - structured request mail visibly separates purpose, review or technical basis, requested work, completion or reply criteria, follow-up, and attachments
    - a deterministic local packet validator passes before Outlook draft application
    - newly authored Outlook text, headings, bullets, and tables are explicitly black and never inherit colored reply-thread formatting
    - optional voice guidance comes from a local/private aggregate profile with provenance
    - an explicitly requested local draft executor may save or display one unsent draft without acquiring send authority
    - an unspecified local Outlook draft request uses the safe local programmatic executor after a non-mutating availability probe or stops with a copy-ready draft
    - same-task continuations reuse trusted subject, recipient order, body correction, exact attachment, control-surface, logical-signature, and exact saved-draft identity bindings
    - the registered signature is inserted into the authored body, verified before save, and never becomes a business attachment
    - a separate current explicit send instruction revalidates the exact locked draft, performs at most one send action, checks a bounded confirmation result, and never retries an unknown or ambiguous outcome
    - synthetic evaluation remains file/text only and never creates or sends an Outlook item
    - a terminal/programmatic request never falls back to UI or computer-control automation
execution_requirements:
  required_capabilities:
    - workflow_launcher_routing
    - owner_style_drafting
    - structured_mail_context_binding
    - adaptive_mail_body_rendering
    - private_profile_boundary_review
    - Outlook_manual_handoff_review
    - explicit_Outlook_control_surface_selection
    - structured_request_mail_validation
    - bound_Outlook_continuation_control
    - inline_Outlook_signature_insertion
  preferred_tools:
    - rg
    - yaml_reader
    - markdown_drafting
  notes:
    - The workflow package owns the procedure and templates; this skill must remain a thin launcher.
    - The voice profile is optional local/private guidance and is not source truth, send authority, or public canon.
    - Skill activation grants no standing external send authority. One current locked draft may be sent only after a separate current explicit owner instruction and one final revalidation.
notes:
  - The installed Codex mirror name is `soulforge-owner-outlook-mail`.
  - The existing `outbound_mail_authoring_v0` workflow remains the sole workflow authority for this slice.
