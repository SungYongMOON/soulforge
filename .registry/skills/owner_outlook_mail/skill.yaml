skill_id: owner_outlook_mail
kind: skill
status: active
title: Owner Outlook Mail
summary: Select the existing outbound mail authoring workflow for owner-style Outlook manual drafts using a lossless public-safe per-assignee team context and an optional local/private aggregate voice profile.
behavior:
  intent: >
    Provide a thin Codex launcher for owner-style Outlook mail authoring through
    `.workflow/outbound_mail_authoring_v0`. The workflow remains procedure
    authority. The launcher selects Outlook manual or draft-only scope, loads
    the public v1 per-assignee team context template, and may bind a local/private aggregate
    voice profile without copying private evidence into public canon.
  use_when:
    - the user explicitly asks for owner-style Outlook mail
    - the user invokes `$soulforge-owner-outlook-mail`
    - a team mail brief should be normalized before an Outlook manual draft
  avoid_when:
    - the task requires Outlook send, move, delete, mark, category, folder, or rule mutation
    - the task requires raw mail body, raw HTML, `.msg`, `.eml`, attachment payload, secret, or credential access
    - the task is sent or received mail reconciliation
  expected_outcome:
    - Codex resolves to `outbound_mail_authoring_v0`
    - requested send surface remains `outlook_manual`
    - authority state remains `draft_only` until owner approval
    - structured context uses the workflow-owned public template
    - supported v0 context normalizes to v1-only without inferred assignees or lost ambiguous values
    - multi-assignee work, notes, schedule, formats/examples, attachments, and response requirements survive into draft review
    - optional voice guidance comes from a local/private aggregate profile with provenance
    - no send authority or Outlook mutation authority is granted
execution_requirements:
  required_capabilities:
    - workflow_launcher_routing
    - owner_style_drafting
    - structured_mail_context_binding
    - private_profile_boundary_review
    - Outlook_manual_handoff_review
  preferred_tools:
    - rg
    - yaml_reader
    - markdown_drafting
  notes:
    - The workflow package owns the procedure and templates; this skill must remain a thin launcher.
    - The voice profile is optional local/private guidance and is not source truth, send authority, or public canon.
    - Skill activation grants neither external send authority nor Outlook mutation authority.
notes:
  - The installed Codex mirror name is `soulforge-owner-outlook-mail`.
  - The existing `outbound_mail_authoring_v0` workflow remains the sole workflow authority for this slice.
