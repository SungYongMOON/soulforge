id: soulforge.base
name: Soulforge 기본 클래스
version: 0.2.0
description: Soulforge 아키텍처 저장소를 위한 canonical reusable loadout template.
body_root: ../.agent
workspace_roots:
  - ../_workspaces/company
  - ../_workspaces/personal
selection_layer_ref: ../.agent/catalog/class
modules:
  skills: skills
  tools: tools
  workflows: workflows
  knowledge: knowledge
  profiles: profiles
  manifests: manifests
  docs: docs
semantics:
  canonical_loadout: true
  reusable_loadout_template: true
  workflows_define_required: true
  profiles_define_preferred: true
  workflow_selection_semantics: required
  profile_selection_semantics: preferred
  profiles_disable_installed_assets: false
