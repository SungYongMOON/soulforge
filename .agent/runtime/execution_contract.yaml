contract_id: soulforge.runtime.execution
mode: transportable_workflow
lineage:
  required_fields:
    - task_id
    - run_id
  delegated_run_requires:
    - parent_task_id
defaults:
  require_idempotency_key_for_workspace_mutation: true
  require_host_side_verification_for_workspace_writes: true
  require_artifact_refs_when_outputs_change: true
verification:
  status_values:
    - pending
    - passed
    - failed
    - skipped
  minimum_fields:
    - verification_status
    - verifier
    - verified_refs
idempotency:
  identity_fields:
    - workflow_id
    - task_id
    - run_id
  replay_rules:
    workspace_mutation: detect_before_rewrite
    external_side_effect: require_explicit_compensation
