binding_set_id: soulforge.registry.traits
policy_floor_ref: ../policy/precedence.yaml
species_profile_ref: ../identity/species_profile.yaml
hero_imprint_ref: ../identity/hero_imprint.yaml
semantic_layers:
  species: durable_default
  hero: identity_overlay
  profile: preferred_mode_via_active_class_binding
  workflow: required_rule_via_class_workflow
communication:
  species_default:
    tone_profile: from.species.default_traits.communication_tone
    question_budget_style: from.species.default_traits.risk_posture
  hero_overlay:
    tone_bias: from.hero.overlay_bias.communication_tone_bias
    question_style_bias: from.hero.overlay_bias.question_style_bias
  effect: bias_only
sessions:
  species_default:
    checkpoint_style: from.species.default_traits.decision_tempo
  hero_overlay:
    checkpoint_signature_bias: from.hero.overlay_bias.artifact_signature_bias
  effect: signature_bias_only
memory:
  species_default:
    recall_priority: from.species.default_traits.memory_bias
  hero_overlay:
    recall_bias: from.hero.overlay_bias.risk_lens_bias
  effect: bias_only
autonomic:
  species_default:
    reminder_noise: from.species.default_traits.autonomy_noise
  hero_overlay:
    reminder_signature_bias: from.hero.overlay_bias.communication_tone_bias
  effect: noise_signature_only
artifacts:
  species_default:
    render_profile: from.species.default_traits.artifact_style
  hero_overlay:
    signature_bias: from.hero.overlay_bias.artifact_signature_bias
  effect: signature_bias_only
workflow_selection:
  species_default:
    decision_tempo: from.species.default_traits.decision_tempo
  hero_overlay:
    workflow_selection_bias: from.hero.overlay_bias.workflow_selection_bias
  effect: preference_bias_only
guardrails:
  hero_overlay_never_changes:
    - factual_validation_rules
    - policy_floor
    - installed_asset_availability
notes:
  - registry는 정본을 복제하지 않고 trait to subsystem binding만 둔다
  - hero overlay는 bias만 더하고 사실 판정 자체를 바꾸지 않는다
  - profile과 workflow의 required or preferred semantics는 active_class_binding과 class 문서에서 정의한다
