id: soulforge-main-body
name: Soulforge Main Body
version: 0.2.0
description: Durable agent unit for mission-oriented work with active identity and selection catalogs
operating_context: ide
identity_assets:
  species_profile: .agent/identity/species_profile.yaml
  hero_imprint: .agent/identity/hero_imprint.yaml
  identity_manifest: .agent/identity/identity_manifest.yaml
  trait_bindings: .agent/registry/trait_bindings.yaml
active_selection:
  species_ref: .agent/identity/species_profile.yaml
  hero_ref: .agent/identity/hero_imprint.yaml
  hero_optional: true
  active_class_binding_ref: .agent/registry/active_class_binding.yaml
  active_profile_ref: .agent_class/profiles/default.profile.yaml
catalog_layer:
  path: .agent/catalog
  roots:
    identity: .agent/catalog/identity
    class: .agent/catalog/class
operating_profiles:
  sessions: continuity_first
  memory: private_first
  autonomic: low_noise
  class_profile_semantics: preferred_not_restrictive
sections:
  identity:
    path: .agent/identity
  catalog:
    path: .agent/catalog
  registry:
    path: .agent/registry
  policy:
    path: .agent/policy
  communication:
    path: .agent/communication
  protocols:
    path: .agent/protocols
  runtime:
    path: .agent/runtime
  memory:
    path: .agent/memory
  sessions:
    path: .agent/sessions
  autonomic:
    path: .agent/autonomic
  artifacts:
    path: .agent/artifacts
section_files:
  identity:
    - .agent/identity/species_profile.yaml
    - .agent/identity/hero_imprint.yaml
    - .agent/identity/identity_manifest.yaml
  catalog:
    - .agent/catalog/identity/species/index.yaml
    - .agent/catalog/identity/species/soulforge-default.species.yaml
    - .agent/catalog/identity/heroes/index.yaml
    - .agent/catalog/identity/heroes/soulforge_default/craft_sage.hero.yaml
    - .agent/catalog/class/profiles/profiles_catalog.yaml
    - .agent/catalog/class/skills/skills_catalog.yaml
    - .agent/catalog/class/tools/adapters_catalog.yaml
    - .agent/catalog/class/tools/connectors_catalog.yaml
    - .agent/catalog/class/tools/local_cli_catalog.yaml
    - .agent/catalog/class/tools/mcp_catalog.yaml
    - .agent/catalog/class/knowledge/knowledge_catalog.yaml
    - .agent/catalog/class/workflows/workflows_catalog.yaml
  registry:
    - .agent/registry/active_class_binding.yaml
    - .agent/registry/workspace_binding.yaml
    - .agent/registry/capability_index.yaml
    - .agent/registry/trait_bindings.yaml
  policy:
    - .agent/policy/precedence.yaml
    - .agent/policy/approval_matrix.yaml
    - .agent/policy/scope_rules.yaml
  communication:
    - .agent/communication/human_channel_profile.yaml
    - .agent/communication/peer_channel_profile.yaml
  protocols:
    - .agent/protocols/request_contract.yaml
    - .agent/protocols/handoff_contract.yaml
    - .agent/protocols/decision_contract.yaml
    - .agent/protocols/incident_contract.yaml
    - .agent/protocols/escalation_contract.yaml
  runtime:
    - .agent/runtime/context_assembly.yaml
    - .agent/runtime/tool_scope.yaml
    - .agent/runtime/sandbox_profile.yaml
    - .agent/runtime/delivery_profile.yaml
  sessions:
    - .agent/sessions/checkpoint_template.yaml
future_expansion:
  team_ready: true
  shared_memory_inside_body: false
  teams_layer_reserved: true
