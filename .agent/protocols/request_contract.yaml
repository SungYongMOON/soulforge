contract_id: soulforge.protocol.request
applies_to:
  - human
  - peer
required_fields:
  - request_id
  - requester
  - mission
  - scope
  - expected_output
  - deadline
  - escalation_rule
optional_fields:
  - constraints
  - file_refs
  - decision_refs
  - workflow_id
  - task_id
  - parent_task_id
  - input_refs
  - output_expectation
  - idempotency_key
  - verification_expectation
normalization:
  runtime_state_must_be_observed_or_declared: true
  implicit_class_binding: false
  implicit_workspace_binding: false
  species_only_default_when_unbound: true
  run_id_assigned_after_request_normalization: true
outputs:
  - normalized_request
  - open_questions
