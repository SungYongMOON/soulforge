contract_id: soulforge.protocol.request
applies_to:
  - human
  - peer
required_fields:
  - request_id
  - requester_kind
  - intent
  - scope
  - constraints
optional_fields:
  - file_refs
  - decision_refs
  - continuity_ref
normalization:
  runtime_state_must_be_observed_or_declared: true
  implicit_class_binding: false
  implicit_workspace_binding: false
  species_only_default_when_unbound: true
outputs:
  - normalized_request
  - open_questions
