contract_id: soulforge.protocol.handoff
mode: continuity_only
required_fields:
  - handoff_id
  - source_agent
  - target_agent
  - summary
  - decisions
  - open_risks
  - next_action
optional_fields:
  - task_id
  - run_id
  - parent_task_id
  - artifact_refs
  - input_refs
  - output_expectation
  - idempotency_key
  - verification_status
  - verification_notes
forbidden_fields:
  - raw_transcript
  - host_local_runtime_state
