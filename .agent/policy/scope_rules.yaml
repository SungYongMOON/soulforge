ruleset_id: soulforge.policy.scope
rules:
  - rule_id: policy_is_species_free_floor
    section: policy
    effect: require
    value: species_free_floor
  - rule_id: sessions_continuity_only
    section: sessions
    effect: allow_only
    values:
      - checkpoint
      - resume_cursor
      - handoff_summary
  - rule_id: sessions_excludes_raw_transcript
    section: sessions
    effect: deny
    values:
      - raw_transcript
      - mission_log
  - rule_id: memory_private_first
    section: memory
    effect: require
    value: private_first
  - rule_id: shared_memory_inside_body
    section: memory
    effect: deny
    value: true
  - rule_id: class_and_workspace_are_optional_overlays
    section: registry
    effect: allow_unset_binding
    value: true
